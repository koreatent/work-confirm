<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>TNS 견적 v1.9 Minimal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0f172a;
      --panel: #1e293b;
      --accent: #6366f1;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-main);
      min-height: 100vh;
    }
    .glass-header {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .glass-footer {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom)) 16px;
      z-index: 50;
    }
    input, select {
      background: #1e293b !important;
      color: #f8fafc !important;
      border: 1px solid #334155 !important;
      transition: all 0.2s;
    }
    input:focus { border-color: var(--accent) !important; ring: 2px var(--accent); }
    .item-card {
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 20px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    .tab-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
    }
    #toast {
      position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: white; padding: 12px 24px;
      border-radius: 999px; font-size: 13px; font-weight: 700;
      z-index: 9999; opacity: 0; transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(10px); }
    .mono { font-family: 'Space Mono', monospace; }
  </style>
</head>
<body class="pb-56">

<div id="toast"></div>

<header class="glass-header p-5 sticky top-0 z-50" style="padding-top: calc(20px + env(safe-area-inset-top));">
  <div class="flex justify-between items-center mb-5">
    <div>
      <h1 class="font-black text-xl tracking-tighter text-white">TNS ESTIMATE <span class="text-indigo-400 text-xs font-mono ml-1">v1.9</span></h1>
      <p class="text-slate-400 text-[11px] font-mono mt-1" id="estimate-no">GENERATING...</p>
    </div>
    <div class="flex flex-col items-end">
        <span class="text-[10px] text-indigo-400 font-black tracking-widest uppercase">System Live</span>
        <div class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse mt-1"></div>
    </div>
  </div>
  <div class="flex bg-slate-800/50 p-1 rounded-xl">
    <button class="tab-btn active flex-1 py-2.5 rounded-lg text-xs font-black transition-all" onclick="switchTab('form')">작성</button>
    <button class="tab-btn flex-1 py-2.5 rounded-lg text-xs font-black text-slate-400 transition-all" onclick="switchTab('records')">기록</button>
  </div>
</header>

<div id="tab-form">
  <main class="p-4 space-y-4">
    <section class="item-card p-5 space-y-4">
      <div class="flex items-center space-x-3">
        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Type</span>
        <select id="work-type" class="flex-1 rounded-xl p-3 font-bold text-indigo-400 text-sm outline-none">
          <option>어닝</option><option>판넬</option><option>천막</option><option>바람막이</option><option>철골</option><option>앵글</option><option>기타</option>
        </select>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <input id="client-name" type="text" placeholder="거래처명" class="rounded-xl p-3 font-bold text-sm">
        <input id="work-name" type="text" placeholder="공사명" class="rounded-xl p-3 font-bold text-sm">
      </div>
    </section>

    <div id="item-container" class="space-y-3"></div>

    <div class="grid grid-cols-2 gap-4 pt-2">
      <button onclick="addTemplate()" class="bg-slate-800 text-slate-300 p-4 rounded-2xl font-black text-sm active:scale-95 transition-transform border border-slate-700">⚡ 템플릿 적용</button>
      <button onclick="addItem()" class="bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg shadow-indigo-500/20 text-sm active:scale-95 transition-transform">+ 품목 추가</button>
    </div>
  </main>

  <footer class="glass-footer">
    <div class="flex justify-between items-end mb-5 px-1">
      <label class="inline-flex items-center cursor-pointer">
        <input id="vat-toggle" type="checkbox" class="sr-only peer" checked onchange="calculate()">
        <div class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:bg-indigo-600 relative after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-5"></div>
        <span id="vat-label" class="ml-3 text-xs font-black text-slate-400">VAT 포함</span>
      </label>
      <div class="text-right">
        <span class="text-[10px] text-slate-500 font-black block uppercase tracking-tighter mb-1">Total Amount</span>
        <span class="text-3xl font-black text-white mono tracking-tighter" id="total-price">0원</span>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-3">
      <button onclick="saveEstimate()" class="bg-slate-800 text-white py-4 rounded-2xl font-black text-xs active:bg-slate-700 border border-slate-700">💾 임시 저장</button>
      <button onclick="generatePDF()" class="bg-indigo-600 text-white py-4 rounded-2xl font-black text-xs shadow-lg shadow-indigo-500/20 active:bg-indigo-700">📄 PDF 내보내기</button>
    </div>
    <button onclick="sendKakao()" class="w-full bg-[#FEE500] text-[#3c1e1e] py-4 rounded-2xl font-black text-xs flex justify-center items-center active:opacity-80">
      <span>💬 카카오톡 공유</span>
    </button>
  </footer>
</div>

<div id="tab-records" class="hidden p-5 pb-10">
  <div class="flex justify-between items-center mb-6">
    <h2 class="font-black text-lg text-white">SAVED RECORDS</h2>
    <span class="bg-indigo-500/10 text-indigo-400 text-[10px] font-mono font-black px-3 py-1 rounded-full border border-indigo-500/20" id="records-count">0</span>
  </div>
  <div id="records-list" class="space-y-4"></div>
</div>

<script>
  const fmt = (n) => new Intl.NumberFormat('ko-KR').format(n);

  function getEstimateNo() {
    const now = new Date();
    const d = now.getFullYear().toString() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
    const rs = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    return `E-${d}-${String(rs.filter(r => r.estimateNo.includes(d)).length + 1).padStart(3,'0')}`;
  }

  let currentNo = getEstimateNo();
  document.getElementById('estimate-no').innerText = currentNo;

  function switchTab(tab) {
    document.getElementById('tab-form').classList.toggle('hidden', tab !== 'form');
    document.getElementById('tab-records').classList.toggle('hidden', tab !== 'records');
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      const active = (tab==='form' && i===0) || (tab==='records' && i===1);
      b.classList.toggle('active', active);
      b.classList.toggle('text-slate-400', !active);
    });
    if(tab==='records') renderRecords();
  }

  function createCard() {
    const div = document.createElement('div');
    div.className = 'item-card p-5 animate-in fade-in slide-in-from-bottom-2 duration-300';
    div.innerHTML = `
      <div class="flex justify-between items-center mb-4">
        <span class="item-label text-[10px] font-mono font-black text-indigo-400 bg-indigo-500/10 px-2 py-1 rounded border border-indigo-500/20 uppercase tracking-widest">ITEM</span>
        <button onclick="this.closest('.item-card').remove(); updateLabels(); calculate();" class="text-slate-500 hover:text-red-400 transition-colors">✕</button>
      </div>
      <input type="text" placeholder="품명" class="item-name w-full bg-transparent border-b border-slate-700 p-2 mb-4 font-bold text-base outline-none focus:border-indigo-500">
      <div class="grid grid-cols-3 gap-3">
        <div class="space-y-1">
            <span class="text-[9px] text-slate-500 font-black uppercase">Unit</span>
            <select class="unit w-full rounded-xl p-3 text-xs font-bold outline-none">
            <option>㎡</option><option>식</option><option>m</option><option>EA</option><option>본</option><option>조</option>
            </select>
        </div>
        <div class="space-y-1">
            <span class="text-[9px] text-slate-500 font-black uppercase">Qty</span>
            <input type="number" placeholder="수량" value="1" inputmode="decimal" class="qty w-full rounded-xl p-3 text-right text-xs font-bold outline-none">
        </div>
        <div class="space-y-1">
            <span class="text-[9px] text-slate-500 font-black uppercase">Price</span>
            <input type="number" placeholder="단가" inputmode="numeric" class="price w-full rounded-xl p-3 text-right text-xs text-indigo-400 font-black outline-none">
        </div>
      </div>
    `;
    div.querySelectorAll('input').forEach(i => {
      i.addEventListener('input', calculate);
      i.addEventListener('change', calculate);
    });
    div.querySelectorAll('select').forEach(s => s.addEventListener('change', calculate));
    return div;
  }

  function addItem() {
    const card = createCard();
    document.getElementById('item-container').appendChild(card);
    updateLabels();
    card.querySelector('.item-name').focus();
    calculate();
  }

  function updateLabels() {
    document.querySelectorAll('.item-card').forEach((c,i) => {
      c.querySelector('.item-label').innerText = `ITEM #${String(i+1).padStart(2,'0')}`;
    });
  }

  function addTemplate() {
    const type = document.getElementById('work-type').value;
    const tpls = {
      '판넬':     [{n:'지붕판넬 75T',u:'㎡'},{n:'벽체판넬',u:'㎡'},{n:'부자재',u:'식'},{n:'설치비',u:'식'}],
      '어닝':     [{n:'어닝 본체',u:'EA'},{n:'부속자재',u:'식'},{n:'설치비',u:'식'}],
      '바람막이': [{n:'원단 시공',u:'㎡'},{n:'부속 철물',u:'식'},{n:'설치 인건비',u:'식'}],
      '천막':     [{n:'천막 원단',u:'㎡'},{n:'철골 프레임',u:'식'},{n:'설치비',u:'식'}],
      '철골':     [{n:'철골 구조물',u:'식'},{n:'용접 및 가공',u:'식'},{n:'설치 인건비',u:'식'}],
      '앵글':     [{n:'앵글 자재',u:'m'},{n:'부속 철물',u:'식'},{n:'설치비',u:'식'}],
    }[type] || [{n:'',u:'식'}];
    document.getElementById('item-container').innerHTML = '';
    tpls.forEach(t => {
      const card = createCard();
      document.getElementById('item-container').appendChild(card);
      card.querySelector('.item-name').value = t.n;
      card.querySelector('.unit').value = t.u;
    });
    updateLabels(); calculate();
    showToast('⚡ 템플릿이 적용되었습니다');
  }

  function calculate() {
    let supply = 0;
    const vatOn = document.getElementById('vat-toggle').checked;
    document.querySelectorAll('.item-card').forEach(card => {
      const q = Number(card.querySelector('.qty').value) || 0;
      const p = Number(card.querySelector('.price').value) || 0;
      supply += (q * p);
    });
    const total = vatOn ? Math.floor(supply * 1.1) : supply;
    document.getElementById('total-price').innerText = fmt(total) + '원';
    document.getElementById('vat-label').innerText = vatOn ? 'VAT 포함' : 'VAT 별도';
  }

  function saveEstimate() {
    const items = Array.from(document.querySelectorAll('.item-card')).map(c => ({
      n: c.querySelector('.item-name').value,
      u: c.querySelector('.unit').value,
      q: c.querySelector('.qty').value,
      p: c.querySelector('.price').value
    }));
    const data = {
      estimateNo: currentNo,
      workType: document.getElementById('work-type').value,
      client: document.getElementById('client-name').value || '미정',
      work: document.getElementById('work-name').value || '',
      items,
      vatOn: document.getElementById('vat-toggle').checked,
      total: document.getElementById('total-price').innerText,
      date: new Date().toISOString()
    };
    const rs = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    const idx = rs.findIndex(r => r.estimateNo === currentNo);
    if(idx>=0) rs[idx]=data; else rs.unshift(data);
    localStorage.setItem('tns_estimates', JSON.stringify(rs));
    showToast('✅ 안전하게 저장되었습니다');
  }

  function renderRecords() {
    const rs = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    document.getElementById('records-count').innerText = rs.length;
    const list = document.getElementById('records-list');
    if(!rs.length) {
      list.innerHTML = '<div class="text-center text-slate-500 py-20 text-xs font-black uppercase tracking-widest">No Records Found</div>';
      return;
    }
    list.innerHTML = rs.map((r,i) => `
      <div class="item-card p-6">
        <div class="flex justify-between items-start mb-4">
          <div>
            <div class="font-black text-white text-lg">${r.client}</div>
            <div class="text-[10px] font-mono text-indigo-400 mt-1 uppercase tracking-tighter">${r.estimateNo} · ${r.workType||''}</div>
            ${r.work ? `<div class="text-xs text-slate-400 mt-2 italic">${r.work}</div>` : ''}
          </div>
          <div class="font-black text-white text-base mono tracking-tighter">${r.total}</div>
        </div>
        <div class="flex gap-3">
          <button onclick="loadRecord(${i})" class="flex-1 bg-indigo-500/10 text-indigo-400 py-3 rounded-xl text-[11px] font-black border border-indigo-500/20 active:bg-indigo-500/20 transition-all">불러오기</button>
          <button onclick="deleteRecord(${i})" class="bg-red-500/10 text-red-400 py-3 px-5 rounded-xl text-[11px] font-black border border-red-500/20 active:bg-red-500/20 transition-all">삭제</button>
        </div>
      </div>
    `).join('');
  }

  function loadRecord(i) {
    const r = JSON.parse(localStorage.getItem('tns_estimates'))[i];
    document.getElementById('work-type').value = r.workType || '어닝';
    document.getElementById('client-name').value = r.client;
    document.getElementById('work-name').value = r.work || '';
    document.getElementById('vat-toggle').checked = r.vatOn;
    document.getElementById('item-container').innerHTML = '';
    (r.items || []).forEach(it => {
      const card = createCard();
      document.getElementById('item-container').appendChild(card);
      card.querySelector('.item-name').value = it.n;
      card.querySelector('.unit').value = it.u;
      card.querySelector('.qty').value = it.q;
      card.querySelector('.price').value = it.p;
    });
    currentNo = r.estimateNo;
    document.getElementById('estimate-no').innerText = currentNo;
    updateLabels(); calculate();
    switchTab('form');
    showToast('📋 불러오기 성공');
  }

  function deleteRecord(i) {
    if(!confirm('기록을 영구히 삭제할까요?')) return;
    const rs = JSON.parse(localStorage.getItem('tns_estimates'));
    rs.splice(i,1);
    localStorage.setItem('tns_estimates', JSON.stringify(rs));
    renderRecords();
  }

  function generatePDF() {
    const client = document.getElementById('client-name').value || '미정';
    const work = document.getElementById('work-name').value || '';
    showToast('📄 PDF 문서 생성 중...');
    const rows = Array.from(document.querySelectorAll('.item-card')).map(c => `
      <tr>
        <td style="border-bottom:1px solid #eee;padding:12px;font-size:12px;">${c.querySelector('.item-name').value}</td>
        <td style="border-bottom:1px solid #eee;padding:12px;font-size:12px;text-align:center;">${c.querySelector('.unit').value}</td>
        <td style="border-bottom:1px solid #eee;padding:12px;font-size:12px;text-align:right;">${c.querySelector('.qty').value}</td>
        <td style="border-bottom:1px solid #eee;padding:12px;font-size:12px;text-align:right;">${fmt(c.querySelector('.price').value)}</td>
        <td style="border-bottom:1px solid #eee;padding:12px;font-size:12px;text-align:right;font-weight:700;">${fmt((Number(c.querySelector('.qty').value)||0)*(Number(c.querySelector('.price').value)||0))}</td>
      </tr>`).join('');
    const today = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});
    const html = `
      <div style="padding:50px;font-family:'Noto Sans KR',sans-serif;color:#0f172a;background:white;">
        <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px;padding-bottom:20px;border-bottom:2px solid #0f172a;">
          <div>
            <div style="font-size:10px;color:#6366f1;font-weight:900;letter-spacing:2px;margin-bottom:5px;">KOREA TENT ANGLE</div>
            <div style="font-size:32px;font-weight:900;letter-spacing:-1px;">견 적 서</div>
          </div>
          <div style="text-align:right;font-size:12px;color:#64748b;">
            번호: ${currentNo}<br>일자: ${today}
          </div>
        </div>
        <div style="margin-bottom:30px;background:#f8fafc;padding:20px;border-radius:10px;">
            <div style="font-size:12px;color:#64748b;margin-bottom:5px;">거래처</div>
            <div style="font-size:18px;font-weight:900;color:#0f172a;">${client} 귀하</div>
            ${work ? `<div style="font-size:13px;color:#475569;margin-top:5px;">공사명: ${work}</div>` : ''}
        </div>
        <table style="width:100%;border-collapse:collapse;margin-bottom:30px;">
          <thead>
            <tr style="border-bottom:2px solid #0f172a;">
              <th style="padding:12px;font-size:11px;text-align:left;color:#64748b;">품명</th>
              <th style="padding:12px;font-size:11px;text-align:center;color:#64748b;">단위</th>
              <th style="padding:12px;font-size:11px;text-align:right;color:#64748b;">수량</th>
              <th style="padding:12px;font-size:11px;text-align:right;color:#64748b;">단가</th>
              <th style="padding:12px;font-size:11px;text-align:right;color:#64748b;">금액</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        <div style="text-align:right;padding:20px;background:#0f172a;border-radius:10px;color:white;">
          <span style="font-size:12px;font-weight:400;margin-right:15px;opacity:0.7;">합계금액 (VAT 포함)</span>
          <span style="font-size:24px;font-weight:900;">${document.getElementById('total-price').innerText}</span>
        </div>
        <div style="margin-top:50px;text-align:center;">
            <div style="font-size:14px;font-weight:900;margin-bottom:5px;">한국천막앵글상사</div>
            <div style="font-size:11px;color:#64748b;">경기도 하남시 신장동 (Tel. 031-XXX-XXXX)</div>
        </div>
      </div>`;
    html2pdf().from(html).set({
      margin: 0,
      filename: `TNS_견적_${currentNo}_${client}.pdf`,
      html2canvas: { scale:3, windowWidth:800 },
      jsPDF: { unit:'mm', format:'a4', orientation:'portrait' }
    }).save().then(() => showToast('📥 PDF 저장 완료!'));
  }

  function sendKakao() {
    const client = document.getElementById('client-name').value || '미정';
    const total = document.getElementById('total-price').innerText;
    const itemList = Array.from(document.querySelectorAll('.item-card'))
      .filter(c => c.querySelector('.item-name').value)
      .map(c => `· ${c.querySelector('.item-name').value} (${c.querySelector('.qty').value}${c.querySelector('.unit').value})`)
      .join('\n');
    const msg = `[TNS 견적 보고]\n\n거래처: ${client}\n내역:\n${itemList}\n\n합계: ${total}\n\n*상세 견적서는 PDF를 확인바랍니다.`;
    
    if(navigator.share) {
      navigator.share({ title:`${client} 견적`, text:msg }).catch(() => copyMsg(msg));
    } else {
      copyMsg(msg);
    }
  }

  function copyMsg(msg) {
    navigator.clipboard.writeText(msg).then(() => showToast('📋 클립보드에 복사되었습니다'));
  }

  function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  addItem();
</script>
</body>
</html>
