<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>TNS 견적서</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1120;
      --panel: #111827;
      --panel-2: #1f2937;
      --line: #374151;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.15);
      --text: #f9fafb;
      --subtext: #94a3b8;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .glass-header {
      background: rgba(11, 17, 32, 0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .glass-footer {
      background: rgba(11, 17, 32, 0.96);
      backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.08);
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom)) 16px;
      z-index: 50;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
    }

    .estimate-item-card {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
    }

    input, select, textarea {
      background: var(--panel-2) !important;
      color: var(--text) !important;
      border: 1px solid var(--line) !important;
      outline: none;
      width: 100%;
    }

    input::placeholder, textarea::placeholder {
      color: #64748b;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.28);
    }

    #toast {
      position: fixed;
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      z-index: 9999;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(8px);
    }

    .mono {
      font-variant-numeric: tabular-nums;
    }

    .summary-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
    }
  </style>
</head>
<body class="pb-64">

<div id="toast"></div>

<header class="glass-header p-5 sticky top-0 z-50" style="padding-top: calc(20px + env(safe-area-inset-top));">
  <div class="flex justify-between items-start mb-5">
    <div>
      <h1 class="font-black text-2xl tracking-tight">TNS 견적서</h1>
      <p class="text-slate-400 text-xs mt-1" id="estimate-no">견적번호 생성 중...</p>
    </div>
    <div class="text-right">
      <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse ml-auto mb-2"></div>
      <p class="text-[11px] text-slate-500" id="today-date"></p>
    </div>
  </div>

  <div class="flex bg-slate-800/70 p-1 rounded-xl">
    <button class="tab-btn active flex-1 py-2.5 rounded-lg text-sm font-bold" onclick="switchTab('form')">작성</button>
    <button class="tab-btn flex-1 py-2.5 rounded-lg text-sm font-bold text-slate-400" onclick="switchTab('records')">기록</button>
  </div>
</header>

<div id="tab-form">
  <main class="p-4 space-y-4">
    <section class="panel p-5 space-y-4">
      <div class="grid grid-cols-1 gap-3">
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-2">공사 종류</label>
          <select id="work-type" class="rounded-xl p-3 font-bold text-sm">
            <option>어닝</option>
            <option>판넬</option>
            <option>천막</option>
            <option>바람막이</option>
            <option>철골</option>
            <option>앵글</option>
            <option>기타</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-slate-400 mb-2">거래처명</label>
            <input id="client-name" type="text" placeholder="거래처명을 입력하세요" class="rounded-xl p-3 font-bold text-sm">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-400 mb-2">공사명</label>
            <input id="work-name" type="text" placeholder="공사명을 입력하세요" class="rounded-xl p-3 font-bold text-sm">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 mb-2">비고</label>
          <textarea id="note" rows="3" placeholder="필요한 메모가 있으면 입력하세요" class="rounded-xl p-3 text-sm resize-none"></textarea>
        </div>
      </div>
    </section>

    <div id="item-container" class="space-y-3"></div>

    <div class="grid grid-cols-2 gap-4 pt-1">
      <button onclick="addTemplate()" class="bg-slate-800 text-slate-200 p-4 rounded-xl font-bold text-sm active:scale-95 transition-transform border border-slate-700">
        기본 품목 불러오기
      </button>
      <button onclick="addItem()" class="bg-blue-600 text-white p-4 rounded-xl font-bold text-sm shadow-lg shadow-blue-500/20 active:scale-95 transition-transform">
        + 품목 추가
      </button>
    </div>
  </main>

  <footer class="glass-footer">
    <div class="summary-box p-4 mb-4">
      <div class="flex justify-between items-center mb-3">
        <label class="inline-flex items-center cursor-pointer">
          <input id="vat-toggle" type="checkbox" class="sr-only peer" checked onchange="calculate()">
          <div class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:bg-blue-600 relative after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-5"></div>
          <span class="ml-3 text-sm font-bold text-slate-300">부가세 포함</span>
        </label>
        <span class="text-xs text-slate-500">자동 계산</span>
      </div>

      <div class="space-y-2 text-sm">
        <div class="flex justify-between">
          <span class="text-slate-400">공급가액</span>
          <span class="font-bold mono" id="supply-price">0원</span>
        </div>
        <div class="flex justify-between">
          <span class="text-slate-400">부가세</span>
          <span class="font-bold mono" id="vat-price">0원</span>
        </div>
        <div class="flex justify-between items-center pt-2 border-t border-slate-700">
          <span class="text-slate-200 font-bold">총합계</span>
          <span class="text-3xl font-black mono tracking-tight text-white" id="total-price">0원</span>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-3">
      <button onclick="saveEstimate()" class="bg-slate-800 text-white py-4 rounded-xl font-bold text-sm border border-slate-700">
        임시 저장
      </button>
      <button onclick="generatePDF()" class="bg-blue-600 text-white py-4 rounded-xl font-bold text-sm shadow-lg shadow-blue-500/20">
        PDF 저장
      </button>
    </div>

    <button onclick="sendKakao()" class="w-full bg-[#FEE500] text-[#3c1e1e] py-4 rounded-xl font-bold text-sm flex justify-center items-center">
      카카오톡 공유 문구 복사
    </button>
  </footer>
</div>

<div id="tab-records" class="hidden p-5">
  <div class="flex justify-between items-center mb-6">
    <h2 class="font-black text-xl">저장된 견적</h2>
    <span class="bg-blue-500/10 text-blue-400 text-xs px-3 py-1 rounded-full border border-blue-500/20" id="records-count">0</span>
  </div>
  <div id="records-list" class="space-y-4"></div>
</div>

<script>
  const COMPANY_NAME = '한국천막앵글상사';

  function fmt(n) {
    return new Intl.NumberFormat('ko-KR').format(Number(n || 0));
  }

  function formatDate(date = new Date()) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}.${m}.${d}`;
  }

  function getEstimateNo() {
    const now = new Date();
    const d = now.getFullYear().toString()
      + String(now.getMonth() + 1).padStart(2, '0')
      + String(now.getDate()).padStart(2, '0');

    const records = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    const todayCount = records.filter(r => (r.estimateNo || '').includes(d)).length + 1;
    return `E-${d}-${String(todayCount).padStart(3, '0')}`;
  }

  function parseMoney(value) {
    if (value == null) return 0;
    const cleaned = String(value).replace(/[^\d.-]/g, '');
    return Number(cleaned) || 0;
  }

  function formatMoneyInput(el) {
    const numeric = parseMoney(el.value);
    if (el.value === '') return;
    el.value = fmt(numeric);
  }

  function getTodayText() {
    return `작성일 ${formatDate()}`;
  }

  let currentNo = getEstimateNo();
  document.getElementById('estimate-no').innerText = `견적번호 ${currentNo}`;
  document.getElementById('today-date').innerText = getTodayText();

  function switchTab(tab) {
    document.getElementById('tab-form').classList.toggle('hidden', tab !== 'form');
    document.getElementById('tab-records').classList.toggle('hidden', tab !== 'records');

    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      const active = (tab === 'form' && i === 0) || (tab === 'records' && i === 1);
      btn.classList.toggle('active', active);
      btn.classList.toggle('text-slate-400', !active);
    });

    if (tab === 'records') renderRecords();
  }

  function createCard() {
    const div = document.createElement('div');
    div.className = 'estimate-item-card p-5';
    div.innerHTML = `
      <div class="flex justify-between items-center mb-4">
        <span class="item-label text-xs font-bold text-blue-400 bg-blue-500/10 px-2.5 py-1 rounded-lg border border-blue-500/20">
          품목 01
        </span>
        <button onclick="removeItem(this)" class="text-slate-500 hover:text-red-400 transition-colors text-lg leading-none">×</button>
      </div>

      <div class="mb-4">
        <label class="block text-xs font-bold text-slate-400 mb-2">품명</label>
        <input type="text" placeholder="품명을 입력하세요" class="item-name rounded-xl p-3 font-bold text-sm">
      </div>

      <div class="grid grid-cols-3 gap-3 mb-4">
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-2">단위</label>
          <select class="unit rounded-xl p-3 text-sm font-bold">
            <option>㎡</option>
            <option>식</option>
            <option>m</option>
            <option>EA</option>
            <option>본</option>
            <option>조</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-2">수량</label>
          <input type="number" placeholder="0" value="1" inputmode="decimal" class="qty rounded-xl p-3 text-right text-sm font-bold">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-2">단가</label>
          <input type="text" placeholder="0" inputmode="numeric" class="price rounded-xl p-3 text-right text-sm font-bold text-blue-300 mono">
        </div>
      </div>

      <div class="summary-box px-4 py-3 flex justify-between items-center">
        <span class="text-sm text-slate-400 font-bold">금액</span>
        <span class="item-amount text-lg font-black mono">0원</span>
      </div>
    `;

    const qtyEl = div.querySelector('.qty');
    const priceEl = div.querySelector('.price');
    const nameEl = div.querySelector('.item-name');
    const unitEl = div.querySelector('.unit');

    [qtyEl, nameEl, unitEl].forEach(el => {
      el.addEventListener('input', calculate);
      el.addEventListener('change', calculate);
    });

    priceEl.addEventListener('input', function () {
      const raw = this.value.replace(/[^\d]/g, '');
      this.value = raw ? fmt(raw) : '';
      calculate();
    });

    priceEl.addEventListener('blur', function () {
      if (this.value) this.value = fmt(parseMoney(this.value));
      calculate();
    });

    return div;
  }

  function removeItem(btn) {
    btn.closest('.estimate-item-card').remove();
    updateLabels();
    calculate();
  }

  function addItem() {
    const card = createCard();
    document.getElementById('item-container').appendChild(card);
    updateLabels();
    calculate();
    card.querySelector('.item-name').focus();
  }

  function updateLabels() {
    document.querySelectorAll('.estimate-item-card').forEach((card, i) => {
      card.querySelector('.item-label').innerText = `품목 ${String(i + 1).padStart(2, '0')}`;
    });
  }

  function calculate() {
    let supply = 0;

    document.querySelectorAll('.estimate-item-card').forEach(card => {
      const qty = Number(card.querySelector('.qty').value) || 0;
      const price = parseMoney(card.querySelector('.price').value);
      const amount = qty * price;

      card.querySelector('.item-amount').innerText = `${fmt(amount)}원`;
      supply += amount;
    });

    const vatOn = document.getElementById('vat-toggle').checked;
    const vat = vatOn ? Math.round(supply * 0.1) : 0;
    const total = supply + vat;

    document.getElementById('supply-price').innerText = `${fmt(supply)}원`;
    document.getElementById('vat-price').innerText = `${fmt(vat)}원`;
    document.getElementById('total-price').innerText = `${fmt(total)}원`;
  }

  function addTemplate() {
    const type = document.getElementById('work-type').value;
    const templates = {
      '판넬': [
        { n: '지붕 판넬', u: '㎡' },
        { n: '벽체 판넬', u: '㎡' },
        { n: '부자재', u: '식' },
        { n: '설치비', u: '식' }
      ],
      '어닝': [
        { n: '어닝 본체', u: 'EA' },
        { n: '부속 자재', u: '식' },
        { n: '설치비', u: '식' }
      ],
      '바람막이': [
        { n: '원단 시공', u: '㎡' },
        { n: '부속 철물', u: '식' },
        { n: '설치 인건비', u: '식' }
      ],
      '천막': [
        { n: '천막 원단', u: '㎡' },
        { n: '철골 프레임', u: '식' },
        { n: '설치비', u: '식' }
      ],
      '철골': [
        { n: '철골 구조물', u: '식' },
        { n: '용접 및 가공', u: '식' },
        { n: '설치 인건비', u: '식' }
      ],
      '앵글': [
        { n: '앵글 자재', u: 'm' },
        { n: '부속 철물', u: '식' },
        { n: '설치비', u: '식' }
      ]
    }[type] || [{ n: '', u: '식' }];

    const container = document.getElementById('item-container');
    container.innerHTML = '';

    templates.forEach(t => {
      const card = createCard();
      container.appendChild(card);
      card.querySelector('.item-name').value = t.n;
      card.querySelector('.unit').value = t.u;
    });

    updateLabels();
    calculate();
    showToast('기본 품목을 불러왔습니다');
  }

  function collectItems() {
    return Array.from(document.querySelectorAll('.estimate-item-card')).map(card => ({
      n: card.querySelector('.item-name').value,
      u: card.querySelector('.unit').value,
      q: card.querySelector('.qty').value,
      p: card.querySelector('.price').value
    }));
  }

  function saveEstimate() {
    const items = collectItems();
    const supply = Array.from(document.querySelectorAll('.estimate-item-card')).reduce((sum, card) => {
      const qty = Number(card.querySelector('.qty').value) || 0;
      const price = parseMoney(card.querySelector('.price').value);
      return sum + (qty * price);
    }, 0);

    const vatOn = document.getElementById('vat-toggle').checked;
    const vat = vatOn ? Math.round(supply * 0.1) : 0;
    const total = supply + vat;

    const data = {
      estimateNo: currentNo,
      workType: document.getElementById('work-type').value,
      client: document.getElementById('client-name').value || '미정',
      work: document.getElementById('work-name').value || '',
      note: document.getElementById('note').value || '',
      items,
      vatOn,
      supply,
      vat,
      total,
      totalText: `${fmt(total)}원`,
      date: new Date().toISOString()
    };

    const records = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    const idx = records.findIndex(r => r.estimateNo === currentNo);

    if (idx >= 0) {
      records[idx] = data;
    } else {
      records.unshift(data);
    }

    localStorage.setItem('tns_estimates', JSON.stringify(records));
    showToast('임시 저장되었습니다');
  }

  function renderRecords() {
    const records = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    document.getElementById('records-count').innerText = records.length;

    const list = document.getElementById('records-list');

    if (!records.length) {
      list.innerHTML = `
        <div class="text-center text-slate-500 py-20 text-sm font-bold">
          저장된 견적이 없습니다
        </div>
      `;
      return;
    }

    list.innerHTML = records.map((r, i) => `
      <div class="panel p-5">
        <div class="flex justify-between items-start mb-4 gap-3">
          <div>
            <div class="font-black text-white text-lg">${r.client || '미정'}</div>
            <div class="text-xs text-slate-400 mt-1">${r.work || '-'}</div>
            <div class="text-[11px] text-blue-400 mt-2">${r.estimateNo}</div>
          </div>
          <div class="font-black text-white text-base mono whitespace-nowrap">${fmt(r.total || 0)}원</div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <button onclick="loadRecord(${i})" class="bg-blue-500/10 text-blue-400 py-3 rounded-xl text-sm font-bold border border-blue-500/20">
            불러오기
          </button>
          <button onclick="deleteRecord(${i})" class="bg-red-500/10 text-red-400 py-3 rounded-xl text-sm font-bold border border-red-500/20">
            삭제
          </button>
        </div>
      </div>
    `).join('');
  }

  function loadRecord(i) {
    const records = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    const r = records[i];
    if (!r) return;

    document.getElementById('work-type').value = r.workType || '어닝';
    document.getElementById('client-name').value = r.client || '';
    document.getElementById('work-name').value = r.work || '';
    document.getElementById('note').value = r.note || '';
    document.getElementById('vat-toggle').checked = !!r.vatOn;

    const container = document.getElementById('item-container');
    container.innerHTML = '';

    (r.items || []).forEach(it => {
      const card = createCard();
      container.appendChild(card);
      card.querySelector('.item-name').value = it.n || '';
      card.querySelector('.unit').value = it.u || '식';
      card.querySelector('.qty').value = it.q || 0;
      card.querySelector('.price').value = it.p || '';
    });

    currentNo = r.estimateNo || getEstimateNo();
    document.getElementById('estimate-no').innerText = `견적번호 ${currentNo}`;

    updateLabels();
    calculate();
    switchTab('form');
    showToast('저장된 견적을 불러왔습니다');
  }

  function deleteRecord(i) {
    if (!confirm('이 견적을 삭제할까요?')) return;

    const records = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    records.splice(i, 1);
    localStorage.setItem('tns_estimates', JSON.stringify(records));
    renderRecords();
    showToast('삭제되었습니다');
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function generatePDF() {
    const client = document.getElementById('client-name').value || '미정';
    const work = document.getElementById('work-name').value || '-';
    const note = document.getElementById('note').value || '';
    const vatOn = document.getElementById('vat-toggle').checked;

    const items = collectItems();
    const supply = items.reduce((sum, it) => {
      const qty = Number(it.q) || 0;
      const price = parseMoney(it.p);
      return sum + (qty * price);
    }, 0);

    const vat = vatOn ? Math.round(supply * 0.1) : 0;
    const total = supply + vat;
    const today = formatDate();

    if (!items.length) {
      showToast('품목을 먼저 입력하세요');
      return;
    }

    const rows = items.map(it => {
      const qty = Number(it.q) || 0;
      const price = parseMoney(it.p);
      const amount = qty * price;

      return `
        <tr>
          <td style="border-bottom:1px solid #e5e7eb;padding:10px 8px;font-size:12px;">${escapeHtml(it.n || '-')}</td>
          <td style="border-bottom:1px solid #e5e7eb;padding:10px 8px;font-size:12px;text-align:center;">${escapeHtml(it.u || '-')}</td>
          <td style="border-bottom:1px solid #e5e7eb;padding:10px 8px;font-size:12px;text-align:right;">${fmt(qty)}</td>
          <td style="border-bottom:1px solid #e5e7eb;padding:10px 8px;font-size:12px;text-align:right;">${fmt(price)}원</td>
          <td style="border-bottom:1px solid #e5e7eb;padding:10px 8px;font-size:12px;text-align:right;font-weight:700;">${fmt(amount)}원</td>
        </tr>
      `;
    }).join('');

    const html = `
      <div style="padding:36px 34px;font-family:'Noto Sans KR',sans-serif;color:#111827;background:#ffffff;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #111827;padding-bottom:18px;margin-bottom:24px;">
          <div>
            <h1 style="font-size:28px;line-height:1.2;font-weight:900;margin:0 0 8px 0;">견 적 서</h1>
            <div style="font-size:14px;font-weight:700;margin-bottom:4px;">${COMPANY_NAME}</div>
            <div style="font-size:12px;color:#6b7280;">상기와 같이 견적합니다.</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:12px;color:#6b7280;margin-bottom:6px;">견적번호 ${currentNo}</div>
            <div style="font-size:12px;color:#6b7280;">작성일 ${today}</div>
          </div>
        </div>

        <table style="width:100%;border-collapse:collapse;margin-bottom:24px;">
          <tr>
            <td style="width:90px;padding:8px 0;font-size:12px;color:#6b7280;">거래처명</td>
            <td style="padding:8px 0;font-size:13px;font-weight:700;">${escapeHtml(client)}</td>
            <td style="width:90px;padding:8px 0;font-size:12px;color:#6b7280;">공사 종류</td>
            <td style="padding:8px 0;font-size:13px;font-weight:700;">${escapeHtml(document.getElementById('work-type').value)}</td>
          </tr>
          <tr>
            <td style="padding:8px 0;font-size:12px;color:#6b7280;">공사명</td>
            <td colspan="3" style="padding:8px 0;font-size:13px;font-weight:700;">${escapeHtml(work)}</td>
          </tr>
        </table>

        <table style="width:100%;border-collapse:collapse;margin-bottom:26px;">
          <thead>
            <tr style="background:#f3f4f6;border-top:1px solid #d1d5db;border-bottom:1px solid #d1d5db;">
              <th style="padding:10px 8px;text-align:left;font-size:12px;">품명</th>
              <th style="padding:10px 8px;text-align:center;font-size:12px;width:70px;">단위</th>
              <th style="padding:10px 8px;text-align:right;font-size:12px;width:70px;">수량</th>
              <th style="padding:10px 8px;text-align:right;font-size:12px;width:110px;">단가</th>
              <th style="padding:10px 8px;text-align:right;font-size:12px;width:120px;">금액</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>

        <div style="display:flex;justify-content:flex-end;margin-bottom:24px;">
          <table style="width:280px;border-collapse:collapse;">
            <tr>
              <td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;font-size:12px;color:#6b7280;">공급가액</td>
              <td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;font-size:12px;text-align:right;font-weight:700;">${fmt(supply)}원</td>
            </tr>
            <tr>
              <td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;font-size:12px;color:#6b7280;">부가세</td>
              <td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;font-size:12px;text-align:right;font-weight:700;">${fmt(vat)}원</td>
            </tr>
            <tr>
              <td style="padding:12px 10px;background:#111827;color:#ffffff;font-size:13px;font-weight:700;">총합계</td>
              <td style="padding:12px 10px;background:#111827;color:#ffffff;font-size:16px;text-align:right;font-weight:900;">${fmt(total)}원</td>
            </tr>
          </table>
        </div>

        ${note ? `
          <div style="margin-top:16px;">
            <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:8px;">비고</div>
            <div style="border:1px solid #e5e7eb;border-radius:8px;padding:12px;font-size:12px;line-height:1.7;color:#374151;white-space:pre-wrap;">${escapeHtml(note)}</div>
          </div>
        ` : ''}

        <div style="margin-top:34px;padding-top:14px;border-top:1px solid #e5e7eb;font-size:11px;color:#6b7280;line-height:1.7;">
          본 견적서는 협의 내용에 따라 변동될 수 있습니다.
        </div>
      </div>
    `;

    showToast('PDF를 생성하는 중입니다');

    html2pdf().from(html).set({
      margin: 8,
      filename: `견적서_${currentNo}.pdf`,
      html2canvas: { scale: 2.5, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).save().then(() => {
      showToast('PDF 저장이 완료되었습니다');
    });
  }

  function sendKakao() {
    const client = document.getElementById('client-name').value || '미정';
    const total = document.getElementById('total-price').innerText;
    const work = document.getElementById('work-name').value || '-';

    const msg =
`[TNS 견적 안내]
거래처명: ${client}
공사명: ${work}
총합계: ${total}
상세 내용은 PDF를 확인해주세요.`;

    if (navigator.share) {
      navigator.share({ text: msg }).catch(() => {
        navigator.clipboard.writeText(msg).then(() => showToast('공유 문구를 복사했습니다'));
      });
    } else {
      navigator.clipboard.writeText(msg).then(() => showToast('공유 문구를 복사했습니다'));
    }
  }

  function showToast(message) {
    const t = document.getElementById('toast');
    t.innerText = message;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  addItem();
  calculate();
</script>
</body>
</html>
