<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>TNS 견적 v2.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }
    body {
      background-color: #f1f5f9;
      color: #0f172a;
      min-height: 100vh;
    }
    /* ── 공통 input/select ── */
    input, select {
      color: #0f172a !important;
      background: #f8fafc !important;
      border-color: #1e3a8a !important;
      border-width: 1px !important;
    }
    input::placeholder { color: #64748b !important; opacity: 1; }
    input:focus, select:focus {
      border-color: #0f172a !important;
      outline: none;
      box-shadow: 0 0 0 3px rgba(15,23,42,0.12);
      background: #ffffff !important;
    }
    select option { background: #ffffff; color: #0f172a; }

    /* ── 헤더 ── */
    header {
      background: #0f172a;
    }
    .tab-bar {
      background: #0c1423;
    }
    .tab-btn { color: rgba(255,255,255,0.55); border-color: rgba(255,255,255,0.15) !important; }
    .tab-btn.active { background: #ffffff !important; color: #0f172a !important; border-color: #ffffff !important; }

    /* ── 카드 ── */
    .card {
      background: #ffffff;
      border: 1px solid #1e3a8a;
      border-radius: 12px;
    }
    .item-card {
      background: #ffffff;
      border: 1px solid #1e3a8a;
      border-radius: 12px;
      border-left: 4px solid #0f172a;
      margin-bottom: 10px;
      transition: all 0.2s ease;
    }
    .item-label {
      background: #eff6ff;
      color: #0f172a;
      border: 1px solid #1e3a8a;
      font-size: 10px;
      font-weight: 900;
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* ── 하단 푸터 ── */
    .sticky-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #ffffff;
      border-top: 2px solid #1e3a8a;
      z-index: 50;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom)) 12px;
    }

    /* ── 버튼 ── */
    .btn-save {
      background: #0f172a;
      color: #ffffff;
    }
    .btn-save:active { background: #1e293b; }
    .btn-pdf {
      background: #ea580c;
      color: #ffffff;
    }
    .btn-pdf:active { background: #c2410c; }
    .btn-kakao {
      background: #facc15;
      color: #713f12;
    }
    .btn-template {
      background: #ffffff;
      color: #0f172a;
      border: 1px solid #1e3a8a;
    }
    .btn-add {
      background: #0f172a;
      color: #ffffff;
    }

    /* ── VAT 토글 ── */
    .vat-track { background: #cbd5e1; }
    .peer:checked ~ .vat-track { background: #0f172a; }

    /* ── 합계 ── */
    #total-price { color: #0f172a; }

    /* ── 기록 탭 ── */
    .record-card {
      background: #ffffff;
      border: 1px solid #1e3a8a;
      border-radius: 12px;
      border-left: 4px solid #0f172a;
    }
    .btn-load {
      background: #eff6ff;
      color: #0f172a;
      border: 1px solid #1e3a8a;
    }
    .btn-delete {
      background: #fff1f2;
      color: #e11d48;
      border: 1px solid #fecdd3;
    }
    #records-count {
      background: #0f172a;
      color: #ffffff;
    }

    /* ── 모달 ── */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 9999; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    #modal-overlay.show { opacity: 1; pointer-events: auto; }
    #modal-box {
      background: #ffffff;
      border: 2px solid #0f172a;
      border-radius: 16px; padding: 24px 28px; text-align: center;
      min-width: 240px; max-width: 80vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    #modal-msg { color: #0f172a; font-size: 15px; font-weight: 700; margin-bottom: 18px; line-height: 1.5; }
    #modal-ok {
      background: #0f172a; color: white;
      border: none; border-radius: 10px;
      padding: 10px 32px; font-size: 14px; font-weight: 900;
      cursor: pointer; width: 100%;
    }
    #modal-ok:active { background: #1e293b; }
  </style>
</head>
<body class="pb-48">

<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-msg"></div>
    <button id="modal-ok" onclick="closeModal()">확인</button>
  </div>
</div>

<!-- 헤더 -->
<header class="p-4 sticky top-0 z-50" style="padding-top: calc(10px + env(safe-area-inset-top));">
  <div class="flex justify-between items-center mb-3">
    <div>
      <p class="text-[10px] font-bold" style="color:rgba(255,255,255,0.5);">한국천막앵글상사</p>
      <h1 class="font-black text-lg tracking-tight text-white">TNS 견적 <span class="text-xs font-normal" style="color:rgba(255,255,255,0.5);">v2.0</span></h1>
      <p class="text-[10px] font-bold" style="color:#93c5fd;" id="estimate-no">번호 생성 중...</p>
    </div>
    <span class="text-[10px] px-2 py-0.5 rounded-full font-bold" style="background:#f59e0b;color:#ffffff;">LIVE</span>
  </div>
  <div class="tab-bar flex space-x-2 -mx-4 px-4 pb-3 pt-1">
    <button class="tab-btn active flex-1 py-2 rounded-lg text-xs font-black border" onclick="switchTab('form')">✏️ 견적 작성</button>
    <button class="tab-btn flex-1 py-2 rounded-lg text-xs font-black border" onclick="switchTab('records')">📋 저장 기록</button>
  </div>
</header>

<!-- 작성 탭 -->
<div id="tab-form">
  <main class="p-3 space-y-3">

    <!-- 기본 정보 -->
    <div class="card p-4 space-y-3">
      <div class="flex items-center space-x-2">
        <label class="text-[10px] font-black text-slate-500 w-10 shrink-0">유형</label>
        <select id="work-type" class="flex-1 border rounded-lg p-2 font-bold text-sm">
          <option>어닝</option><option>판넬</option><option>천막</option><option>바람막이</option><option>철골</option><option>앵글</option><option>기타</option>
        </select>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <input id="client-name" type="text" placeholder="거래처명" class="border rounded-lg p-2 font-bold text-sm">
        <input id="work-name" type="text" placeholder="공사명" class="border rounded-lg p-2 font-bold text-sm">
      </div>
    </div>

    <!-- 품목 -->
    <div id="item-container" class="space-y-2"></div>

    <!-- 버튼 -->
    <div class="grid grid-cols-2 gap-3 pt-1">
      <button onclick="addTemplate()" class="btn-template p-3 rounded-xl font-black text-sm">⚡ 템플릿</button>
      <button onclick="addItem()" class="btn-add p-3 rounded-xl font-black text-sm">+ 품목 추가</button>
    </div>
  </main>

  <!-- 하단 푸터 -->
  <footer class="sticky-footer">
    <div class="flex justify-between items-center px-1 mb-3">
      <label class="inline-flex items-center cursor-pointer">
        <input id="vat-toggle" type="checkbox" class="sr-only peer" checked onchange="calculate()">
        <div class="vat-track w-9 h-5 rounded-full peer peer-checked:bg-slate-900 relative after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-4"></div>
        <span id="vat-label" class="ml-2 text-xs font-black text-slate-700">VAT 포함</span>
      </label>
      <div class="text-right">
        <span class="text-[10px] text-slate-500 font-bold block">최종합계</span>
        <span class="text-2xl font-black" id="total-price">0원</span>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-2 mb-2">
      <button onclick="saveEstimate()" class="btn-save py-3 rounded-xl font-black text-xs shadow-md">💾 저장</button>
      <button onclick="generatePDF()" class="btn-pdf py-3 rounded-xl font-black text-xs shadow-md">📄 견적서 PDF</button>
      <button onclick="generateStatementPDF()" class="btn-pdf py-3 rounded-xl font-black text-xs shadow-md">🧾 거래명세서 PDF</button>
    </div>
    <button onclick="sendKakao()" class="btn-kakao w-full py-3.5 rounded-xl font-black text-xs shadow-sm flex justify-center items-center">
      <span>💬 카카오톡 내용 복사 및 전송</span>
    </button>
  </footer>
</div>

<!-- 기록 탭 -->
<div id="tab-records" class="hidden p-4 pb-10">
  <div class="flex justify-between items-center mb-4">
    <h2 class="font-black text-base" style="color:#0f172a;">저장된 견적서</h2>
    <span class="records-count text-xs font-black px-3 py-1 rounded-full" id="records-count">0건</span>
  </div>
  <div id="records-list" class="space-y-3"></div>
</div>

<script>
  const fmt = (n) => new Intl.NumberFormat('ko-KR').format(n);

  // ── 공급자 정보 (PDF용) ──
  const SUPPLIER = {
    bizNo:   '126-17-66563',
    name:    '한국천막앵글상사',
    ceo:     '장지성외 1명',
    addr:    '(12970) 경기 하남시 신장로 184 108호',
    bizType: '도소매',
    bizItem: '천막앵글파이프 제작',
    tel:     '031-791-4499',
    fax:     '031-794-4054',
    mobile:  '010-3685-5591',
    email:   'gtorr00@naver.com',
  };

const STAMP_B64 = 'stamp.png';

  // ── 견적번호 생성 ──
  function getEstimateNo() {
    const now = new Date();
    const d = now.getFullYear().toString() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
    const rs = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    return `E-${d}-${String(rs.filter(r => r.estimateNo.includes(d)).length + 1).padStart(3,'0')}`;
  }

  let currentNo = getEstimateNo();
  document.getElementById('estimate-no').innerText = currentNo;

  // ── 탭 전환 ──
  function switchTab(tab) {
    document.getElementById('tab-form').classList.toggle('hidden', tab !== 'form');
    document.getElementById('tab-records').classList.toggle('hidden', tab !== 'records');
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      const active = (tab==='form' && i===0) || (tab==='records' && i===1);
      b.classList.toggle('active', active);
    });
    if(tab==='records') renderRecords();
  }

  // ── 품목 카드 생성 ──
  function createCard() {
    const div = document.createElement('div');
    div.className = 'item-card p-4';
    div.innerHTML = `
      <div class="flex justify-between items-center mb-2">
        <span class="item-label">ITEM</span>
        <button onclick="this.closest('.item-card').remove(); updateLabels(); calculate();" class="text-slate-400 text-sm font-bold hover:text-red-400">✕</button>
      </div>
      <input type="text" placeholder="품명 직접 입력" class="item-name w-full border rounded-lg p-2 mb-2 font-bold text-sm">
      <div class="grid grid-cols-3 gap-2">
        <select class="unit border rounded-lg p-2 text-xs">
          <option>㎡</option><option>식</option><option>m</option><option>EA</option><option>본</option><option>조</option>
        
<option value="인">인</option>
</select>
        <input type="number" placeholder="수량" value="1" inputmode="decimal" class="qty border rounded-lg p-2 text-right text-xs">
        <input type="number" placeholder="단가" inputmode="numeric" class="price border rounded-lg p-2 text-right text-xs font-bold">
      </div>
    `;
    div.querySelectorAll('input').forEach(i => {
      i.addEventListener('input', calculate);
      i.addEventListener('change', calculate);
    });
    div.querySelectorAll('select').forEach(s => s.addEventListener('change', calculate));
    return div;
  }

  function addItem() {
    const card = createCard();
    document.getElementById('item-container').appendChild(card);
    updateLabels();
    card.querySelector('.item-name').focus();
    calculate();
  }

  function updateLabels() {
    document.querySelectorAll('.item-card').forEach((c,i) => {
      c.querySelector('.item-label').innerText = `ITEM #${i+1}`;
    });
  }

  // ── 템플릿 ──
  function addTemplate() {
    const type = document.getElementById('work-type').value;
    const tpls = {
      '판넬':     [{n:'지붕판넬 75T',u:'㎡'},{n:'벽체판넬',u:'㎡'},{n:'부자재',u:'식'},{n:'설치비',u:'식'}],
      '어닝':     [{n:'어닝 본체',u:'EA'},{n:'부속자재',u:'식'},{n:'설치비',u:'식'}],
      '바람막이': [{n:'원단 시공',u:'㎡'},{n:'부속 철물',u:'식'},{n:'설치 인건비',u:'식'}],
      '천막':     [{n:'천막 원단',u:'㎡'},{n:'철골 프레임',u:'식'},{n:'설치비',u:'식'}],
      '철골':     [{n:'철골 구조물',u:'식'},{n:'용접 및 가공',u:'식'},{n:'설치 인건비',u:'식'}],
      '앵글':     [{n:'앵글 자재',u:'m'},{n:'부속 철물',u:'식'},{n:'설치비',u:'식'}],
    }[type] || [{n:'',u:'식'}];
    document.getElementById('item-container').innerHTML = '';
    tpls.forEach(t => {
      const card = createCard();
      document.getElementById('item-container').appendChild(card);
      card.querySelector('.item-name').value = t.n;
      card.querySelector('.unit').value = t.u;
    });
    updateLabels(); calculate();
  }

  // ── 계산 ──
  function calculate() {
    let supply = 0;
    const vatOn = document.getElementById('vat-toggle').checked;
    document.querySelectorAll('.item-card').forEach(card => {
      const q = Number(card.querySelector('.qty').value) || 0;
      const p = Number(card.querySelector('.price').value) || 0;
      supply += (q * p);
    });
    const total = vatOn ? Math.floor(supply * 1.1) : supply;
    document.getElementById('total-price').innerText = fmt(total) + '원';
    document.getElementById('vat-label').innerText = vatOn ? 'VAT 포함' : 'VAT 별도';
  }

  // ── 저장 ──
  function saveEstimate() {
    const items = Array.from(document.querySelectorAll('.item-card')).map(c => ({
      n: c.querySelector('.item-name').value,
      u: c.querySelector('.unit').value,
      q: c.querySelector('.qty').value,
      p: c.querySelector('.price').value
    }));
    const data = {
      estimateNo: currentNo,
      workType: document.getElementById('work-type').value,
      client: document.getElementById('client-name').value || '미정',
      work: document.getElementById('work-name').value || '',
      items,
      vatOn: document.getElementById('vat-toggle').checked,
      total: document.getElementById('total-price').innerText,
      date: new Date().toISOString()
    };
    const rs = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    const idx = rs.findIndex(r => r.estimateNo === currentNo);
    if(idx>=0) rs[idx]=data; else rs.unshift(data);
    localStorage.setItem('tns_estimates', JSON.stringify(rs));
    showToast('✅ 저장 완료!');
  }

  // ── 기록 렌더링 ──
  function renderRecords() {
    const rs = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    document.getElementById('records-count').innerText = rs.length + '건';
    const list = document.getElementById('records-list');
    if(!rs.length) {
      list.innerHTML = '<div class="text-center text-slate-400 py-10 text-sm font-bold">저장된 견적서가 없습니다</div>';
      return;
    }
    list.innerHTML = rs.map((r,i) => `
      <div class="record-card p-4">
        <div class="flex justify-between items-start">
          <div>
            <div class="font-black text-slate-900">${r.client}</div>
            <div class="text-xs text-slate-500 mt-0.5">${r.estimateNo} · ${r.workType||''}</div>
            ${r.work ? `<div class="text-xs text-slate-600 mt-0.5">${r.work}</div>` : ''}
          </div>
          <div class="font-black text-slate-900">${r.total}</div>
        </div>
        <div class="flex gap-2 mt-3">
          <button onclick="loadRecord(${i})" class="btn-load flex-1 py-2 rounded-xl text-xs font-black">✏️ 불러오기</button>
          <button onclick="deleteRecord(${i})" class="btn-delete py-2 px-3 rounded-xl text-xs font-black">🗑️ 삭제</button>
        </div>
      </div>
    `).join('');
  }

  // ── 불러오기 ──
  function loadRecord(i) {
    const r = JSON.parse(localStorage.getItem('tns_estimates'))[i];
    document.getElementById('work-type').value = r.workType || '어닝';
    document.getElementById('client-name').value = r.client;
    document.getElementById('work-name').value = r.work || '';
    document.getElementById('vat-toggle').checked = r.vatOn;
    document.getElementById('item-container').innerHTML = '';
    (r.items || []).forEach(it => {
      const card = createCard();
      document.getElementById('item-container').appendChild(card);
      card.querySelector('.item-name').value = it.n;
      card.querySelector('.unit').value = it.u;
      card.querySelector('.qty').value = it.q;
      card.querySelector('.price').value = it.p;
    });
    currentNo = r.estimateNo;
    document.getElementById('estimate-no').innerText = currentNo;
    updateLabels(); calculate();
    switchTab('form');
    showToast('✅ 불러왔어요 — ' + r.estimateNo);
  }

  // ── 삭제 ──
  function deleteRecord(i) {
    if(!confirm('삭제할까요?')) return;
    const rs = JSON.parse(localStorage.getItem('tns_estimates'));
    rs.splice(i,1);
    localStorage.setItem('tns_estimates', JSON.stringify(rs));
    renderRecords();
  }


  // ── 문서 공통 데이터 ──
  function getDocData() {
    const client = document.getElementById('client-name').value || '미정';
    const work   = document.getElementById('work-name').value || '';
    const vatOn  = document.getElementById('vat-toggle').checked;

    let supply = 0;
    const items = Array.from(document.querySelectorAll('.item-card')).map(c => {
      const name = c.querySelector('.item-name').value || '-';
      const unit = c.querySelector('.unit').value || '';
      const qty  = Number(c.querySelector('.qty').value) || 0;
      const price= Number(c.querySelector('.price').value) || 0;
      const amt  = qty * price;
      supply += amt;
      return { name, unit, qty, price, amt };
    });

    const vatAmt = vatOn ? Math.floor(supply * 0.1) : 0;
    const total  = vatOn ? supply + vatAmt : supply;
    const today  = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});

    return { client, work, vatOn, items, supply, vatAmt, total, today };
  }

  function buildRows(items) {
    return items.map(it => `
      <tr>
        <td style="border:1px solid #cbd5e1;padding:8px 10px;font-size:12px;">${it.name}</td>
        <td style="border:1px solid #cbd5e1;padding:8px 10px;font-size:12px;text-align:center;">${it.unit}</td>
        <td style="border:1px solid #cbd5e1;padding:8px 10px;font-size:12px;text-align:right;">${it.qty}</td>
        <td style="border:1px solid #cbd5e1;padding:8px 10px;font-size:12px;text-align:right;">${fmt(it.price)}</td>
        <td style="border:1px solid #cbd5e1;padding:8px 10px;font-size:12px;text-align:right;font-weight:700;">${fmt(it.amt)}</td>
      </tr>`).join('');
  }

  function buildSupplierCell() {
    return `
      <td style="border:1px solid #cbd5e1;padding:5px 8px;font-size:11px;vertical-align:middle;text-align:left;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;">
          <span style="font-size:11px;">${SUPPLIER.ceo}</span>
          <img src="${STAMP_B64}" style="width:46px;height:46px;object-fit:contain;opacity:0.9;display:inline-block;" />
        </div>
      </td>`;
  }

  function buildEstimateHTML() {
    const { client, work, vatOn, items, supply, vatAmt, total, today } = getDocData();
    const rows = buildRows(items);

    return `
      <div style="padding:32px 36px;font-family:'Noto Sans KR',sans-serif;color:#1e293b;background:#fff;">
        <div style="text-align:center;margin-bottom:18px;padding-bottom:14px;border-bottom:3px solid #0f172a;">
          <div style="font-size:10px;color:#64748b;letter-spacing:3px;margin-bottom:6px;font-weight:700;">한국천막앵글상사</div>
          <div style="font-size:28px;font-weight:900;letter-spacing:6px;color:#0f172a;">견 적 서</div>
        </div>

        <table style="width:100%;border-collapse:collapse;margin-bottom:16px;font-size:11px;table-layout:fixed;">
          <tr>
            <td style="width:50%;vertical-align:top;padding-right:8px;">
              <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
                <tr>

  function makePDF(html, filename, btn) {
    const origText = btn.innerText;
    btn.innerText = '⏳ 생성 중...';
    btn.disabled = true;

    const wrapper = document.createElement('div');
    wrapper.innerHTML = html;

    html2pdf().from(wrapper).set({
      margin: 8,
      filename,
      html2canvas: { scale: 2, windowWidth: 794, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).save().then(() => {
      showToast('📄 PDF 저장 완료!\n파일 앱에서 확인하세요.');
    }).catch((err) => {
      console.error(err);
      showToast('❌ PDF 생성 실패');
    }).finally(() => {
      btn.innerText = origText;
      btn.disabled = false;
    });
  }

    const btn = document.querySelector('button[onclick="generatePDF()"]');
    const { client } = getDocData();
    makePDF(buildEstimateHTML(), `${currentNo}_${client}_견적서.pdf`, btn);
  }

  function generateStatementPDF() {
    const btn = document.querySelector('button[onclick="generateStatementPDF()"]');

  // ── 카카오톡 복사 ──
  function sendKakao() {
    const client = document.getElementById('client-name').value || '미정';
    const total  = document.getElementById('total-price').innerText;
    const vatOn  = document.getElementById('vat-toggle').checked;
    const itemList = Array.from(document.querySelectorAll('.item-card'))
      .filter(c => c.querySelector('.item-name').value)
      .map(c => `· ${c.querySelector('.item-name').value} ${c.querySelector('.qty').value}${c.querySelector('.unit').value} × ${fmt(c.querySelector('.price').value)}원`)
      .join('\n');
    const msg = `[한국천막앵글상사 견적]\n번호: ${currentNo}\n거래처: ${client}\n\n${itemList}\n\n합계: ${total} ${vatOn?'(VAT포함)':'(VAT별도)'}\n\nTEL: ${SUPPLIER.tel} / M: ${SUPPLIER.mobile}`;
    if(navigator.share) {
      navigator.share({ title:`견적서 ${currentNo}`, text:msg }).catch(() => copyMsg(msg));
    } else {
      copyMsg(msg);
    }
  }

  function copyMsg(msg) {
    navigator.clipboard.writeText(msg).then(() => showToast('📋 복사 완료!\n카톡에 붙여넣으세요.'));
  }

  // ── 모달 ──
