<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>TNS 견적 v1.9</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1025;
      --surface: #231535;
      --surface2: #2d1f44;
      --border: #3d2a5a;
      --purple: #7c3aed;
      --purple-light: #9d6af5;
      --orange: #f97316;
      --orange-dark: #ea6c0a;
      --text: #e9d5ff;
      --text-muted: #a78bca;
      --text-dim: #7c5fa0;
    }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .sticky-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 50;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom)) 12px;
    }
    input, select {
      background: var(--surface2) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    input::placeholder { color: var(--text-dim) !important; }
    input:focus, select:focus { border-color: var(--purple-light) !important; outline: none; box-shadow: 0 0 0 3px rgba(157,106,245,0.25) !important; }
    .item-card { transition: all 0.2s ease; margin-bottom: 10px; }
    .tab-btn.active { background: var(--purple) !important; color: white !important; border-color: var(--purple) !important; }
    #toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #2d1f44; color: white; padding: 10px 20px;
      border-radius: 10px; font-size: 13px; font-weight: 700;
      z-index: 9999; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; border: 1px solid var(--border);
    }
    #toast.show { opacity: 1; }
    option { background: var(--surface2); color: var(--text); }
  </style>
</head>
<body class="pb-52">

<div id="toast"></div>

<!-- 헤더 -->
<header style="background:var(--surface);border-bottom:1px solid var(--border);" class="text-white p-4 shadow-lg sticky top-0 z-50" style="padding-top: calc(10px + env(safe-area-inset-top));">
  <div class="flex justify-between items-center mb-3" style="padding-top: calc(env(safe-area-inset-top));">
    <div>
      <h1 class="font-black text-lg tracking-tight" style="color:var(--text);">TNS 견적 <span style="color:var(--text-dim);font-size:10px;font-weight:400;">v1.9</span></h1>
      <p style="color:var(--purple-light);font-size:10px;font-weight:700;" id="estimate-no">번호 생성 중...</p>
    </div>
    <span class="text-[10px] bg-green-400 px-2 py-0.5 rounded-full font-bold text-green-900">LIVE</span>
  </div>
  <div class="flex space-x-2">
    <button class="tab-btn active flex-1 py-1.5 rounded-lg text-xs font-black" style="border:1px solid var(--border);" onclick="switchTab('form')">✏️ 견적 작성</button>
    <button class="tab-btn flex-1 py-1.5 rounded-lg text-xs font-black" style="border:1px solid var(--border);color:var(--text-muted);" onclick="switchTab('records')">📋 저장 기록</button>
  </div>
</header>

<!-- 작성 탭 -->
<div id="tab-form">
  <main class="p-3 space-y-3">
    <section class="p-4 rounded-xl shadow-sm space-y-3" style="background:var(--surface);border:1px solid var(--border);">
      <div class="grid grid-cols-2 gap-2">
        <div class="col-span-2 flex items-center space-x-2">
          <label style="color:var(--text-dim);font-size:10px;font-weight:900;" class="w-8">유형</label>
          <select id="work-type" class="flex-1 border rounded-lg p-2 font-bold text-sm" style="color:var(--purple-light);">
            <option>어닝</option><option>판넬</option><option>천막</option><option>바람막이</option><option>철골</option><option>앵글</option><option>기타</option>
          </select>
        </div>
        <input id="client-name" type="text" placeholder="거래처명" class="border rounded-lg p-2 font-bold text-sm">
        <input id="work-name" type="text" placeholder="공사명" class="border rounded-lg p-2 font-bold text-sm">
      </div>
    </section>

    <div id="item-container" class="space-y-2"></div>
  </main>

  <footer class="sticky-footer">
    <!-- 품목 추가 버튼 (고정) -->
    <div class="grid grid-cols-2 gap-2 mb-3">
      <button onclick="addTemplate()" class="py-2.5 rounded-xl font-black text-sm active:opacity-80" style="background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);">⚡ 템플릿</button>
      <button onclick="addItem()" class="py-2.5 rounded-xl font-black text-sm text-white active:opacity-80" style="background:var(--orange);">+ 품목 추가</button>
    </div>
    <!-- VAT + 합계 -->
    <div class="flex justify-between items-center px-1 mb-2">
      <label class="inline-flex items-center cursor-pointer">
        <input id="vat-toggle" type="checkbox" class="sr-only peer" checked onchange="calculate()">
        <div class="w-9 h-5 rounded-full peer relative after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-4" style="background:var(--border);" id="vat-track"></div>
        <span id="vat-label" class="ml-2 text-xs font-black" style="color:var(--text-muted);">VAT 포함</span>
      </label>
      <div class="text-right">
        <span style="color:var(--text-dim);font-size:10px;font-weight:700;" class="block">최종합계</span>
        <span class="text-2xl font-black" style="color:var(--orange);" id="total-price">0원</span>
      </div>
    </div>
    <!-- 저장/PDF -->
    <div class="grid grid-cols-2 gap-2 mb-2">
      <button onclick="saveEstimate()" class="text-white py-3 rounded-xl font-black text-xs shadow-md active:opacity-80" style="background:var(--purple);">💾 저장</button>
      <button onclick="generatePDF()" class="text-white py-3 rounded-xl font-black text-xs shadow-md active:opacity-80" style="background:var(--surface2);border:1px solid var(--border);">📄 PDF 생성</button>
    </div>
    <!-- 카카오톡 -->
    <button onclick="sendKakao()" class="w-full bg-yellow-400 text-yellow-900 py-3.5 rounded-xl font-black text-xs shadow-sm flex justify-center items-center">
      <span>💬 카카오톡 내용 복사 및 전송</span>
    </button>
  </footer>
</div>

<!-- 기록 탭 -->
<div id="tab-records" class="hidden p-4 pb-10">
  <div class="flex justify-between items-center mb-4">
    <h2 class="font-black text-base" style="color:var(--text);">저장된 견적서</h2>
    <span class="text-xs font-black px-3 py-1 rounded-full" style="background:var(--surface2);color:var(--purple-light);" id="records-count">0건</span>
  </div>
  <div id="records-list" class="space-y-3"></div>
</div>

<div id="pdf-preview" style="position:fixed;left:-9999px;top:0;width:210mm;background:white;z-index:-1;"></div>

<script>
  const fmt = (n) => new Intl.NumberFormat('ko-KR').format(n);

  // ── 견적번호 생성 ──
  function getEstimateNo() {
    const now = new Date();
    const d = now.getFullYear().toString() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
    const rs = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    return `E-${d}-${String(rs.filter(r => r.estimateNo.includes(d)).length + 1).padStart(3,'0')}`;
  }

  let currentNo = getEstimateNo();
  document.getElementById('estimate-no').innerText = currentNo;

  // ── 탭 전환 ──
  function switchTab(tab) {
    document.getElementById('tab-form').classList.toggle('hidden', tab !== 'form');
    document.getElementById('tab-records').classList.toggle('hidden', tab !== 'records');
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      const active = (tab==='form' && i===0) || (tab==='records' && i===1);
      b.classList.toggle('active', active);
      b.classList.toggle('text-violet-200', !active);
    });
    if(tab==='records') renderRecords();
  }

  // ── 품목 카드 생성 ──
  function createCard() {
    const div = document.createElement('div');
    div.className = 'item-card p-4 rounded-xl shadow-sm';
    div.style.cssText = 'background:var(--surface);border-left:4px solid var(--orange);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);';
    div.innerHTML = `
      <div class="flex justify-between items-center mb-2">
        <span class="item-label font-black px-2 py-0.5 rounded" style="font-size:10px;color:var(--orange);background:rgba(249,115,22,0.1);">ITEM</span>
        <button onclick="this.closest('.item-card').remove(); updateLabels(); calculate();" style="color:var(--text-dim);font-size:14px;">✕</button>
      </div>
      <input type="text" placeholder="품명 직접 입력" class="item-name w-full p-2 mb-2 font-bold text-sm" style="border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);">
      <div class="grid grid-cols-3 gap-2">
        <select class="unit border rounded p-2 text-xs">
          <option>㎡</option><option>식</option><option>m</option><option>EA</option><option>본</option><option>조</option>
        </select>
        <input type="number" placeholder="수량" value="1" inputmode="decimal" class="qty border rounded p-2 text-right text-xs">
        <input type="number" placeholder="단가" inputmode="numeric" class="price border rounded p-2 text-right text-xs font-bold" style="color:var(--orange);">
      </div>
    `;
    div.querySelectorAll('input').forEach(i => {
      i.addEventListener('input', calculate);
      i.addEventListener('change', calculate);
    });
    div.querySelectorAll('select').forEach(s => s.addEventListener('change', calculate));
    return div;
  }

  function addItem() {
    const card = createCard();
    document.getElementById('item-container').appendChild(card);
    updateLabels();
    card.querySelector('.item-name').focus();
    calculate();
  }

  function updateLabels() {
    document.querySelectorAll('.item-card').forEach((c,i) => {
      c.querySelector('.item-label').innerText = `ITEM #${i+1}`;
    });
  }

  // ── 템플릿 ──
  function addTemplate() {
    const type = document.getElementById('work-type').value;
    const tpls = {
      '판넬':     [{n:'지붕판넬 75T',u:'㎡'},{n:'벽체판넬',u:'㎡'},{n:'부자재',u:'식'},{n:'설치비',u:'식'}],
      '어닝':     [{n:'어닝 본체',u:'EA'},{n:'부속자재',u:'식'},{n:'설치비',u:'식'}],
      '바람막이': [{n:'원단 시공',u:'㎡'},{n:'부속 철물',u:'식'},{n:'설치 인건비',u:'식'}],
      '천막':     [{n:'천막 원단',u:'㎡'},{n:'철골 프레임',u:'식'},{n:'설치비',u:'식'}],
      '철골':     [{n:'철골 구조물',u:'식'},{n:'용접 및 가공',u:'식'},{n:'설치 인건비',u:'식'}],
      '앵글':     [{n:'앵글 자재',u:'m'},{n:'부속 철물',u:'식'},{n:'설치비',u:'식'}],
    }[type] || [{n:'',u:'식'}];
    document.getElementById('item-container').innerHTML = '';
    tpls.forEach(t => {
      const card = createCard();
      document.getElementById('item-container').appendChild(card);
      card.querySelector('.item-name').value = t.n;
      card.querySelector('.unit').value = t.u;
    });
    updateLabels(); calculate();
  }

  // ── 계산 ──
  function calculate() {
    let supply = 0;
    const vatOn = document.getElementById('vat-toggle').checked;
    document.querySelectorAll('.item-card').forEach(card => {
      const q = Number(card.querySelector('.qty').value) || 0;
      const p = Number(card.querySelector('.price').value) || 0;
      supply += (q * p);
    });
    const total = vatOn ? Math.floor(supply * 1.1) : supply;
    document.getElementById('total-price').innerText = fmt(total) + '원';
    document.getElementById('vat-label').innerText = vatOn ? 'VAT 포함' : 'VAT 별도';
  }

  // ── 저장 ──
  function saveEstimate() {
    const items = Array.from(document.querySelectorAll('.item-card')).map(c => ({
      n: c.querySelector('.item-name').value,
      u: c.querySelector('.unit').value,
      q: c.querySelector('.qty').value,
      p: c.querySelector('.price').value
    }));
    const data = {
      estimateNo: currentNo,
      workType: document.getElementById('work-type').value,
      client: document.getElementById('client-name').value || '미정',
      work: document.getElementById('work-name').value || '',
      items,
      vatOn: document.getElementById('vat-toggle').checked,
      total: document.getElementById('total-price').innerText,
      date: new Date().toISOString()
    };
    const rs = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    const idx = rs.findIndex(r => r.estimateNo === currentNo);
    if(idx>=0) rs[idx]=data; else rs.unshift(data);
    localStorage.setItem('tns_estimates', JSON.stringify(rs));
    showToast('✅ 저장 완료!');
  }

  // ── 기록 렌더링 ──
  function renderRecords() {
    const rs = JSON.parse(localStorage.getItem('tns_estimates') || '[]');
    document.getElementById('records-count').innerText = rs.length + '건';
    const list = document.getElementById('records-list');
    if(!rs.length) {
      list.innerHTML = '<div class="text-center text-slate-400 py-10 text-sm font-bold">저장된 견적서가 없습니다</div>';
      return;
    }
    list.innerHTML = rs.map((r,i) => `
      <div class="p-4 rounded-2xl shadow-sm" style="background:var(--surface);border:1px solid var(--border);">
        <div class="flex justify-between items-start">
          <div>
            <div class="font-black" style="color:var(--text);">${r.client}</div>
            <div class="text-xs" style="color:var(--text-dim);">${r.estimateNo} · ${r.workType||''}</div>
            ${r.work ? `<div class="text-xs" style="color:var(--text-muted);margin-top:2px;">${r.work}</div>` : ''}
          </div>
          <div class="font-black" style="color:var(--orange);">${r.total}</div>
        </div>
        <div class="flex gap-2 mt-3">
          <button onclick="loadRecord(${i})" class="flex-1 py-2 rounded-xl text-xs font-black active:opacity-80" style="background:var(--surface2);color:var(--purple-light);border:1px solid var(--border);">✏️ 불러오기</button>
          <button onclick="deleteRecord(${i})" class="py-2 px-3 rounded-xl text-xs font-black active:opacity-80" style="background:rgba(239,68,68,0.1);color:#f87171;">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  // ── 불러오기 ──
  function loadRecord(i) {
    const r = JSON.parse(localStorage.getItem('tns_estimates'))[i];
    document.getElementById('work-type').value = r.workType || '어닝';
    document.getElementById('client-name').value = r.client;
    document.getElementById('work-name').value = r.work || '';
    document.getElementById('vat-toggle').checked = r.vatOn;
    document.getElementById('item-container').innerHTML = '';
    (r.items || []).forEach(it => {
      const card = createCard();
      document.getElementById('item-container').appendChild(card);
      card.querySelector('.item-name').value = it.n;
      card.querySelector('.unit').value = it.u;
      card.querySelector('.qty').value = it.q;
      card.querySelector('.price').value = it.p;
    });
    currentNo = r.estimateNo;
    document.getElementById('estimate-no').innerText = currentNo;
    updateLabels(); calculate();
    switchTab('form');
    showToast('✅ 불러왔어요 — ' + r.estimateNo);
  }

  // ── 삭제 ──
  function deleteRecord(i) {
    if(!confirm('삭제할까요?')) return;
    const rs = JSON.parse(localStorage.getItem('tns_estimates'));
    rs.splice(i,1);
    localStorage.setItem('tns_estimates', JSON.stringify(rs));
    renderRecords();
  }

  // ── PDF 생성 ──
  function generatePDF() {
    const client = document.getElementById('client-name').value || '미정';
    const work = document.getElementById('work-name').value || '';
    showToast('📄 PDF 생성 중...');
    const rows = Array.from(document.querySelectorAll('.item-card')).map(c => `
      <tr>
        <td style="border:1px solid #ddd;padding:8px;font-size:12px;">${c.querySelector('.item-name').value}</td>
        <td style="border:1px solid #ddd;padding:8px;font-size:12px;text-align:center;">${c.querySelector('.unit').value}</td>
        <td style="border:1px solid #ddd;padding:8px;font-size:12px;text-align:right;">${c.querySelector('.qty').value}</td>
        <td style="border:1px solid #ddd;padding:8px;font-size:12px;text-align:right;">${fmt(c.querySelector('.price').value)}</td>
        <td style="border:1px solid #ddd;padding:8px;font-size:12px;text-align:right;font-weight:700;">${fmt((Number(c.querySelector('.qty').value)||0)*(Number(c.querySelector('.price').value)||0))}</td>
      </tr>`).join('');
    const today = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});
    const html = `
      <div style="padding:40px;font-family:'Noto Sans KR',sans-serif;color:#1e293b;">
        <div style="text-align:center;margin-bottom:24px;padding-bottom:12px;border-bottom:3px solid #7c3aed;">
          <div style="font-size:11px;color:#7c3aed;letter-spacing:3px;margin-bottom:4px;font-weight:700;">한국천막앵글상사</div>
          <div style="font-size:26px;font-weight:900;letter-spacing:4px;">견 적 서</div>
        </div>
        <table style="width:100%;border-collapse:collapse;margin-bottom:20px;">
          <tr>
            <td style="padding:8px;border:1px solid #ddd;background:#f5f0ff;font-size:12px;font-weight:700;width:80px;">견적번호</td>
            <td style="padding:8px;border:1px solid #ddd;font-size:12px;">${currentNo}</td>
            <td style="padding:8px;border:1px solid #ddd;background:#f5f0ff;font-size:12px;font-weight:700;width:60px;">견적일</td>
            <td style="padding:8px;border:1px solid #ddd;font-size:12px;">${today}</td>
          </tr>
          <tr>
            <td style="padding:8px;border:1px solid #ddd;background:#f5f0ff;font-size:12px;font-weight:700;">거래처</td>
            <td style="padding:8px;border:1px solid #ddd;font-size:13px;font-weight:700;">${client}</td>
            <td style="padding:8px;border:1px solid #ddd;background:#f5f0ff;font-size:12px;font-weight:700;">공사명</td>
            <td style="padding:8px;border:1px solid #ddd;font-size:12px;">${work}</td>
          </tr>
        </table>
        <table style="width:100%;border-collapse:collapse;margin-bottom:20px;">
          <thead>
            <tr style="background:#7c3aed;color:white;">
              <th style="padding:10px;font-size:12px;text-align:left;">품명</th>
              <th style="padding:10px;font-size:12px;text-align:center;">단위</th>
              <th style="padding:10px;font-size:12px;text-align:right;">수량</th>
              <th style="padding:10px;font-size:12px;text-align:right;">단가</th>
              <th style="padding:10px;font-size:12px;text-align:right;">금액</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        <div style="text-align:right;font-size:18px;font-weight:900;color:#7c3aed;margin-top:8px;">
          합계: ${document.getElementById('total-price').innerText}
        </div>
        <div style="margin-top:24px;padding-top:12px;border-top:1px solid #ddd;font-size:11px;color:#999;text-align:center;">
          한국천막앵글상사 · 발행일: ${today}
        </div>
      </div>`;
    html2pdf().from(html).set({
      margin: 10,
      filename: `${currentNo}_${client}.pdf`,
      html2canvas: { scale:2, windowWidth:794 },
      jsPDF: { unit:'mm', format:'a4', orientation:'portrait' }
    }).save().then(() => showToast('📥 저장 완료! 파일 앱에서 확인하세요.'));
  }

  // ── 카카오톡 복사 ──
  function sendKakao() {
    const client = document.getElementById('client-name').value || '미정';
    const total = document.getElementById('total-price').innerText;
    const itemList = Array.from(document.querySelectorAll('.item-card'))
      .filter(c => c.querySelector('.item-name').value)
      .map(c => `· ${c.querySelector('.item-name').value} ${c.querySelector('.qty').value}${c.querySelector('.unit').value} × ${fmt(c.querySelector('.price').value)}원`)
      .join('\n');
    const msg = `[한국천막앵글상사 견적]\n번호: ${currentNo}\n거래처: ${client}\n\n${itemList}\n\n합계: ${total}`;
    if(navigator.share) {
      navigator.share({ title:`견적서 ${currentNo}`, text:msg }).catch(() => copyMsg(msg));
    } else {
      copyMsg(msg);
    }
  }

  function copyMsg(msg) {
    navigator.clipboard.writeText(msg).then(() => showToast('📋 복사 완료! 카톡에 붙여넣으세요.'));
  }

  // ── 토스트 ──
  function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
