<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>TNS 견적 v2.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }
    body {
      background-color: #f1f5f9;
      color: #0f172a;
      min-height: 100vh;
    }
    /* ── 공통 input/select ── */
    input, select {
      color: #0f172a !important;
      background: #f8fafc !important;
      border-color: #1e3a8a !important;
      border-width: 1px !important;
    }
    input::placeholder { color: #64748b !important; opacity: 1; }
    input:focus, select:focus {
      border-color: #0f172a !important;
      outline: none;
      box-shadow: 0 0 0 3px rgba(15,23,42,0.12);
      background: #ffffff !important;
    }
    select option { background: #ffffff; color: #0f172a; }

    /* ── 헤더 ── */
    header {
      background: #ffffff;
      border-bottom: 2px solid #e2e8f0;
    }
    .tab-bar {
      background: #ffffff;
    }
    .tab-btn { color: #94a3b8; border-color: #e2e8f0 !important; }
    .tab-btn.active { background: #0f172a !important; color: #ffffff !important; border-color: #0f172a !important; }

    /* ── 카드 ── */
    .card {
      background: #ffffff;
      border: 1px solid #1e3a8a;
      border-radius: 12px;
    }
    .item-card {
      background: #ffffff;
      border: 1px solid #1e3a8a;
      border-radius: 12px;
      border-left: 4px solid #0f172a;
      margin-bottom: 10px;
      transition: all 0.2s ease;
    }
    .item-label {
      background: #eff6ff;
      color: #0f172a;
      border: 1px solid #1e3a8a;
      font-size: 10px;
      font-weight: 900;
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* ── 하단 푸터 ── */
    .sticky-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(10px);
      border-top: 2px solid #1e3a8a;
      z-index: 50;
      padding: 8px 10px calc(6px + env(safe-area-inset-bottom)) 10px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    body.keyboard-open .sticky-footer {
      transform: translateY(120%);
      opacity: 0;
      pointer-events: none;
    }

    /* ── 버튼 ── */
    .btn-save {
      background: #0f172a;
      color: #ffffff;
    }
    .btn-save:active { background: #1e293b; }
    .btn-pdf {
      background: #ea580c;
      color: #ffffff;
    }
    .btn-pdf:active { background: #c2410c; }

    .btn-labor {
      background: #1e40af;
      color: #ffffff;
    }
    .btn-labor:active { background: #1e3a8a; }
    .labor-card {
      background: #eff6ff;
      border: 1px solid #1e40af;
      border-radius: 12px;
      border-left: 4px solid #1e40af;
      margin-bottom: 10px;
      transition: all 0.2s ease;
    }


    /* ── PDF 전용 영역 ── */
    #pdf-root {
      display: none;
    }
    @media print {
      body > *:not(#pdf-root) { display: none !important; }
      #pdf-root {
        display: block !important;
        width: 794px;
        margin: 0;
        padding: 0;
        background: #fff;
        font-family: 'Noto Sans KR', sans-serif;
      }
      @page {
        size: A4;
        margin: 10mm;
      }
      .pdf-page-break {
        page-break-before: always;
      }
    }

    /* ── 순서 변경 ── */
    .sort-handle {
      cursor: grab;
      color: #94a3b8;
      font-size: 14px;
      padding: 2px 4px;
      user-select: none;
      touch-action: none;
    }
    .sort-handle:active { cursor: grabbing; }
    .btn-move {
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      color: #64748b;
      font-size: 11px;
      padding: 2px 6px;
      line-height: 1;
      cursor: pointer;
    }
    .btn-move:active { background: #f1f5f9; }
    .btn-move:disabled { opacity: 0.25; cursor: default; }
    .card-dragging {
      opacity: 0.4;
      transform: scale(0.98);
    }
    .card-dragover {
      border-top: 3px solid #0f172a !important;
    }
    .labor-label {
      background: #1e40af;
      color: #ffffff;
      font-size: 10px;
      font-weight: 900;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .btn-template {
      background: #ffffff;
      color: #0f172a;
      border: 1px solid #1e3a8a;
    }
    .btn-add {
      background: #0f172a;
      color: #ffffff;
    }

    /* ── VAT 토글 ── */
    .vat-track { background: #cbd5e1; }
    .peer:checked ~ .vat-track { background: #0f172a; }

    /* ── 합계 ── */
    #total-price { color: #0f172a; }

    /* ── 기록 탭 ── */
    .record-card {
      background: #ffffff;
      border: 1px solid #1e3a8a;
      border-radius: 12px;
      border-left: 4px solid #0f172a;
    }
    .btn-load {
      background: #eff6ff;
      color: #0f172a;
      border: 1px solid #1e3a8a;
    }
    .btn-delete {
      background: #fff1f2;
      color: #e11d48;
      border: 1px solid #fecdd3;
    }
    .btn-confirm {
      background: #15803d;
      color: #ffffff;
    }
    .btn-confirm:active { background: #166534; }
    .status-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 900;
      padding: 2px 7px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .status-draft    { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
    .status-approved { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .status-autosave { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
    #records-count {
      background: #0f172a;
      color: #ffffff;
    }

    /* ── 모달 ── */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 9999; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    #modal-overlay.show { opacity: 1; pointer-events: auto; }
    #modal-box {
      background: #ffffff;
      border: 2px solid #0f172a;
      border-radius: 16px; padding: 24px 28px; text-align: center;
      min-width: 240px; max-width: 80vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    #modal-msg { color: #0f172a; font-size: 15px; font-weight: 700; margin-bottom: 18px; line-height: 1.5; }
    #modal-ok {
      background: #0f172a; color: white;
      border: none; border-radius: 10px;
      padding: 10px 32px; font-size: 14px; font-weight: 900;
      cursor: pointer; width: 100%;
    }
    #modal-ok:active { background: #1e293b; }
  </style>
</head>
<body class="pb-32">

<div id="pdf-root"></div>

<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-msg"></div>
    <button id="modal-ok" onclick="closeModal()">확인</button>
  </div>
</div>

<!-- 헤더 -->
<header class="p-4 sticky top-0 z-50" style="padding-top: calc(10px + env(safe-area-inset-top));">
  <div class="flex justify-between items-center mb-3">
    <div>
      <p class="text-[10px] font-bold" style="color:#94a3b8;">한국천막앵글상사</p>
      <h1 class="font-black text-lg tracking-tight" style="color:#0f172a;">TNS 견적 <span class="text-xs font-normal" style="color:#94a3b8;">v2.1</span></h1>
      <p class="text-[10px] font-bold" style="color:#0f172a;" id="estimate-no">번호 생성 중...</p>
    </div>
    <span class="text-[10px] px-2 py-0.5 rounded-full font-bold" style="background:#0f172a;color:#ffffff;">LIVE</span>
  </div>
  <div class="tab-bar flex space-x-2 -mx-4 px-4 pb-3 pt-1">
    <button class="tab-btn active flex-1 py-2 rounded-lg text-xs font-black border" onclick="switchTab('form')">✏️ 견적 작성</button>
    <button class="tab-btn flex-1 py-2 rounded-lg text-xs font-black border" onclick="switchTab('records')">📋 저장 기록</button>
  </div>
</header>

<!-- 작성 탭 -->
<div id="tab-form">
  <main class="p-3 space-y-3 pb-28">

    <!-- 기본 정보 -->
    <div class="card p-4 space-y-3">
      <div class="flex items-center space-x-2">
        <label class="text-[10px] font-black text-slate-500 w-10 shrink-0">유형</label>
        <select id="work-type" class="flex-1 border rounded-lg p-2 font-bold text-sm">
          <option>어닝</option><option>판넬</option><option>천막</option><option>바람막이</option><option>철골</option><option>앵글</option><option>기타</option>
        </select>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <input id="client-name" type="text" placeholder="거래처명" class="border rounded-lg p-2 font-bold text-sm">
        <input id="work-name" type="text" placeholder="공사명" class="border rounded-lg p-2 font-bold text-sm">
      </div>
    </div>

    <!-- 품목 -->
    <div id="item-container" class="space-y-2"></div>

    <div class="text-[11px] text-slate-500 font-bold px-1">품목은 하단 바의 <span class="text-slate-900">+ 품목 추가</span> 버튼으로 추가</div>
  </main>

  <!-- 하단 푸터 -->
  <footer class="sticky-footer">
    <div class="flex justify-between items-center px-1 mb-2">
      <div class="flex items-center gap-3">
        <label class="inline-flex items-center cursor-pointer">
          <input id="vat-toggle" type="checkbox" class="sr-only peer" checked onchange="calculate()">
          <div class="vat-track w-9 h-5 rounded-full peer peer-checked:bg-slate-900 relative after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-4"></div>
          <span id="vat-label" class="ml-2 text-xs font-black text-slate-700">VAT 포함</span>
        </label>
        <label class="inline-flex items-center cursor-pointer">
          <input id="statement-toggle" type="checkbox" class="sr-only peer" onchange="toggleStatement()">
          <div class="vat-track w-9 h-5 rounded-full peer peer-checked:bg-slate-900 relative after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-4"></div>
          <span class="ml-2 text-xs font-black text-slate-700">명세서</span>
        </label>
      </div>
      <div class="text-right">
        <span class="text-[10px] text-slate-500 font-bold block">최종합계</span>
        <span class="text-xl font-black leading-none" id="total-price">0원</span>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-2">
      <button onclick="addItem()" class="btn-add py-3 rounded-xl font-black text-[11px] shadow-md">+ 품목 추가</button>
      <button onclick="addLaborItem()" class="btn-labor py-3 rounded-xl font-black text-[11px] shadow-md">+ 인건비 추가</button>
      <button onclick="saveEstimate('draft')" class="btn-save py-3 rounded-xl font-black text-[11px] shadow-md">💾 견적 저장</button>
      <button onclick="saveEstimate('approved')" class="btn-confirm py-3 rounded-xl font-black text-[11px] shadow-md">✅ 견적 확정</button>
      <button onclick="generatePDF()" class="btn-pdf py-3 rounded-xl font-black text-[11px] shadow-md col-span-2">견적서 PDF</button>

    </div>
  </footer>
</div>

<!-- 기록 탭 -->
<div id="tab-records" class="hidden p-4 pb-10">
  <div class="flex justify-between items-center mb-4">
    <h2 class="font-black text-base" style="color:#0f172a;">저장된 견적서</h2>
    <span class="records-count text-xs font-black px-3 py-1 rounded-full" id="records-count">0건</span>
  </div>
  <div id="records-list" class="space-y-3"></div>
</div>

  // TNS_Storage v1.0 — LocalStorage 기반
  // 구조: estimate_header + estimate_line 분리
  // 차기: Railway + PostgreSQL 이식 예정
  // ══════════════════════════════════════════
  const TNS_Storage = {
    HEADER_KEY: 'tns_estimate_headers',
    LINE_KEY:   'tns_estimate_lines',

    getAllHeaders() {
      return JSON.parse(localStorage.getItem(this.HEADER_KEY) || '[]');
    },

    getLines(estimateId) {
      const all = JSON.parse(localStorage.getItem(this.LINE_KEY) || '[]');
      return all.filter(l => l.estimate_id === estimateId);
    },

    save(header, lines) {
      const headers = this.getAllHeaders();
      const hi = headers.findIndex(h => h.estimate_id === header.estimate_id);
      if (hi >= 0) headers[hi] = header; else headers.unshift(header);
      localStorage.setItem(this.HEADER_KEY, JSON.stringify(headers));

      const allLines = JSON.parse(localStorage.getItem(this.LINE_KEY) || '[]');
      const kept = allLines.filter(l => l.estimate_id !== header.estimate_id);
      localStorage.setItem(this.LINE_KEY, JSON.stringify(kept.concat(lines)));
      return { success: true, estimate_id: header.estimate_id };
    },

    load(estimateId) {
      const header = this.getAllHeaders().find(h => h.estimate_id === estimateId);
      if (!header) return null;
      return { header, lines: this.getLines(estimateId) };
    },

    delete(estimateId) {
      localStorage.setItem(this.HEADER_KEY, JSON.stringify(this.getAllHeaders().filter(h => h.estimate_id !== estimateId)));
      localStorage.setItem(this.LINE_KEY, JSON.stringify(JSON.parse(localStorage.getItem(this.LINE_KEY) || '[]').filter(l => l.estimate_id !== estimateId)));
      return { success: true };
    },

    list() {
      return this.getAllHeaders().map(h => ({
        estimate_id:     h.estimate_id,
        estimate_date:   h.estimate_date,
        customer_name:   h.customer_name,
        project_name:    h.project_name,
        site_name:       h.site_name,
        estimate_status: h.estimate_status,
        total_amount:    h.total_amount
      }));
    }
  };

      { rule_id: 'R-052', raw: '자바라천막 지붕천막', std: '자바라천막 지붕천막', category: '기타', group: '자바라', confidence: 'HIGH' },

    ],

    getAll() {
      const stored = localStorage.getItem(this.KEY);
      return stored ? JSON.parse(stored) : [...this.DEFAULT_RULES];
    },

    init() {
      if (!localStorage.getItem(this.KEY)) {
        localStorage.setItem(this.KEY, JSON.stringify(this.DEFAULT_RULES));
      }
    },

    // raw 입력값 → std + group 찾기 (부분 매칭)
    resolve(rawInput) {
      const rules = this.getAll();
      const input = rawInput.trim().toLowerCase();
      // 1순위: 완전 일치
      let hit = rules.find(r => r.raw.toLowerCase() === input);
      // 2순위: 포함 매칭
      if (!hit) hit = rules.find(r => input.includes(r.raw.toLowerCase()) || r.raw.toLowerCase().includes(input));
      if (!hit) return null;
      return { std: hit.std, category: hit.category, group: hit.group, confidence: hit.confidence };
    }
  };

  function getEstimateNo() {

    const rs = TNS_Storage.getAllHeaders();
    return `E-${d}-${String(rs.filter(r => r.estimate_id.includes(d)).length + 1).padStart(3,'0')}`;

  // ── ↑↓ 버튼 이동 ──
  function moveCard(btn, dir) {
    const card = btn.closest('.item-card, .labor-card');
    const container = document.getElementById('item-container');
    const cards = Array.from(container.children);
    const idx = cards.indexOf(card);
    const target = idx + dir;
    if (target < 0 || target >= cards.length) return;
    if (dir === -1) {
      container.insertBefore(card, cards[target]);
    } else {
      container.insertBefore(card, cards[target].nextSibling);
    }
    updateLabels();
    calculate();
    card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // ── 드래그 앤 드롭 (터치 + 마우스) ──
  (function initDragDrop() {
    let dragging = null;
    let placeholder = null;

    function getCard(el) {
      return el.closest('.item-card, .labor-card');
    }
    function getContainer() {
      return document.getElementById('item-container');
    }

    // 마우스 드래그
    document.getElementById('item-container').addEventListener('mousedown', (e) => {
      if (!e.target.classList.contains('sort-handle')) return;
      const card = getCard(e.target);
      if (!card) return;
      dragging = card;
      dragging.classList.add('card-dragging');
      placeholder = document.createElement('div');
      placeholder.style.cssText = 'height:' + card.offsetHeight + 'px;border:2px dashed #94a3b8;border-radius:12px;margin-bottom:10px;background:#f8fafc;';
      card.parentNode.insertBefore(placeholder, card.nextSibling);
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const container = getContainer();
      const siblings = Array.from(container.children).filter(c => c !== dragging && c !== placeholder);
      let insertBefore = null;
      for (const sib of siblings) {
        const rect = sib.getBoundingClientRect();
        if (e.clientY < rect.top + rect.height / 2) { insertBefore = sib; break; }
      }
      if (insertBefore) container.insertBefore(placeholder, insertBefore);
      else container.appendChild(placeholder);
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging.classList.remove('card-dragging');
      placeholder.parentNode.insertBefore(dragging, placeholder);
      placeholder.remove();
      placeholder = null;
      dragging = null;
      updateLabels();
      calculate();
    });

    // 터치 드래그 (iPad)
    document.getElementById('item-container').addEventListener('touchstart', (e) => {
      if (!e.target.classList.contains('sort-handle')) return;
      const card = getCard(e.target);
      if (!card) return;
      dragging = card;
      dragging.classList.add('card-dragging');
      placeholder = document.createElement('div');
      placeholder.style.cssText = 'height:' + card.offsetHeight + 'px;border:2px dashed #94a3b8;border-radius:12px;margin-bottom:10px;background:#f8fafc;';
      card.parentNode.insertBefore(placeholder, card.nextSibling);
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      const touch = e.touches[0];
      const container = getContainer();
      const siblings = Array.from(container.children).filter(c => c !== dragging && c !== placeholder);
      let insertBefore = null;
      for (const sib of siblings) {
        const rect = sib.getBoundingClientRect();
        if (touch.clientY < rect.top + rect.height / 2) { insertBefore = sib; break; }
      }
      if (insertBefore) container.insertBefore(placeholder, insertBefore);
      else container.appendChild(placeholder);
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchend', () => {
      if (!dragging) return;
      dragging.classList.remove('card-dragging');
      placeholder.parentNode.insertBefore(dragging, placeholder);
      placeholder.remove();
      placeholder = null;
      dragging = null;
      updateLabels();
      calculate();
    });
  })();

  // ── 자동저장 (30초) — TNS_Storage에 autosave 상태로 저장 ──
  const AUTO_SAVE_KEY = 'tns_autosave_id'; // 현재 자동저장 estimate_id 추적용

  function autoSave() {
    if (isLocked) return;
    // 입력 내용이 있을 때만 저장 (품목 1개 이상이거나 거래처/공사명 입력된 경우)
    const hasContent = document.getElementById('client-name').value.trim() ||
                       document.getElementById('work-name').value.trim() ||
                       document.querySelectorAll('#item-container .item-card, #item-container .labor-card').length > 1 ||
                       (document.querySelectorAll('#item-container .item-card').length === 1 &&
                        document.querySelector('.item-name') && document.querySelector('.item-name').value.trim());
    if (!hasContent) return;

    const now = new Date().toISOString();
    const header = {
      estimate_id:     currentNo,
      estimate_date:   now.slice(0, 10),
      customer_name:   document.getElementById('client-name').value || '(임시저장)',
      site_name:       document.getElementById('work-name').value || '',
      project_name:    document.getElementById('work-type').value || '',
      estimate_status: 'autosave',
      total_amount:    document.getElementById('total-price').innerText,
      vat_on:          document.getElementById('vat-toggle').checked,
      created_at:      now
    };
    let lineNo = 1;
    const itemLines = Array.from(document.querySelectorAll('.item-card')).map(c => ({
      estimate_id:  currentNo,
      line_no:      lineNo++,
      line_type:    'item',
      item_name:    c.querySelector('.item-name').value,
      quantity:     c.querySelector('.qty').value,
      unit:         c.querySelector('.unit').value || '',
      unit2:        c.querySelector('.unit2') ? c.querySelector('.unit2').value : '',
      unit_price:   c.querySelector('.price').value,
      total_amount: String(num(c.querySelector('.qty').value) * num(c.querySelector('.price').value))
    }));
    const laborLines = Array.from(document.querySelectorAll('.labor-card')).map(c => {
      const p = num(c.querySelector('.labor-people').value);
      const d = num(c.querySelector('.labor-days').value);
      const w = num(c.querySelector('.labor-wage').value);
      return {
        estimate_id:  currentNo,
        line_no:      lineNo++,
        line_type:    'labor',
        item_name:    c.querySelector('.labor-type').value,
        quantity:     String(p * d),
        unit:         '인·일',
        unit_price:   String(w),
        total_amount: String(p * d * w),
        labor_people: String(p),
        labor_days:   String(d),
        labor_wage:   String(w)
      };
    });
    try {
      TNS_Storage.save(header, [...itemLines, ...laborLines]);
      localStorage.setItem(AUTO_SAVE_KEY, currentNo);
    } catch(e) {}
  }

  function clearAutoSave() {
    try {
      const id = localStorage.getItem(AUTO_SAVE_KEY);
      if (id) TNS_Storage.delete(id);
      localStorage.removeItem(AUTO_SAVE_KEY);
    } catch(e) {}
  }

  // ── 거래명세서 토글 ── (버튼 없음, PDF 출력 방식만 변경)
  function toggleStatement() {
    const on = document.getElementById('statement-toggle').checked;
    const label = document.querySelector('label[for="statement-toggle"] span') || 
                  document.getElementById('statement-toggle').closest('label').querySelector('span');
  }

  // ── 계산 ──
  function calculate() {
    let supply = 0;
    const vatOn = document.getElementById('vat-toggle').checked;
    document.querySelectorAll('.item-card').forEach(card => {
      const q = num(card.querySelector('.qty').value);
      const p = num(card.querySelector('.price').value);
      supply += (q * p);
    });
    document.querySelectorAll('.labor-card').forEach(card => {
      const p = num(card.querySelector('.labor-people').value);
      const d = num(card.querySelector('.labor-days').value);
      const w = num(card.querySelector('.labor-wage').value);
      supply += (p * d * w);
    });
    const total = vatOn ? Math.floor(supply * 1.1) : supply;
    document.getElementById('total-price').innerText = fmt(total) + '원';
    document.getElementById('vat-label').innerText = vatOn ? 'VAT 포함' : 'VAT 별도';
  }


  function ensureVisible(el) {
    setTimeout(() => { el.scrollIntoView({ block: 'center', behavior: 'smooth' }); }, 120);
  }
  // ── 저장 ──
  function saveEstimate(status) {
    status = status || 'draft';
    const now = new Date().toISOString();
    const header = {
      estimate_id:     currentNo,
      estimate_date:   now.slice(0, 10),
      customer_name:   document.getElementById('client-name').value || '미정',
      site_name:       document.getElementById('work-name').value || '',
      project_name:    document.getElementById('work-type').value || '',
      estimate_status: status,
      total_amount:    document.getElementById('total-price').innerText,
      vat_on:          document.getElementById('vat-toggle').checked,
      created_at:      now
    };
    let lineNo = 1;
    const itemLines = Array.from(document.querySelectorAll('.item-card')).map(c => ({
      estimate_id:  currentNo,
      line_no:      lineNo++,
      line_type:    'item',
      item_name:    c.querySelector('.item-name').value,
      quantity:     c.querySelector('.qty').value,
      unit:         c.querySelector('.unit').value || '',
      unit2:        c.querySelector('.unit2') ? c.querySelector('.unit2').value : '',
      unit_price:   c.querySelector('.price').value,
      total_amount: String(num(c.querySelector('.qty').value) * num(c.querySelector('.price').value))
    }));
    const laborLines = Array.from(document.querySelectorAll('.labor-card')).map(c => {
      const p = num(c.querySelector('.labor-people').value);
      const d = num(c.querySelector('.labor-days').value);
      const w = num(c.querySelector('.labor-wage').value);
      return {
        estimate_id:  currentNo,
        line_no:      lineNo++,
        line_type:    'labor',
        item_name:    c.querySelector('.labor-type').value,
        quantity:     String(p * d),
        unit:         '인·일',
        unit_price:   String(w),
        total_amount: String(p * d * w),
        labor_people: String(p),
        labor_days:   String(d),
        labor_wage:   String(w)
      };
    });
    const result = TNS_Storage.save(header, [...itemLines, ...laborLines]);
    if (result.success) {
      try { localStorage.removeItem(AUTO_SAVE_KEY); } catch(e) {}
      showToast(status === 'approved' ? '✅ 견적 확정 완료!' : '💾 저장 완료!');
    }
    else showToast('❌ 저장 실패');
  }

  // ── 기록 렌더링 ──

          ${isDraft ? `<button onclick="confirmRecord('${r.estimate_id}')" class="btn-confirm py-2 px-3 rounded-xl text-xs font-black">✅ 확정</button>` : ''}
          <button onclick="deleteRecord('${r.estimate_id}')" class="btn-delete py-2 px-3 rounded-xl text-xs font-black">🗑️</button>

  // ── 불러오기 ──
  function loadRecord(estimateId) {
    const data = TNS_Storage.load(estimateId);
    if (!data) return;
    const { header, lines } = data;
    document.getElementById('work-type').value   = header.project_name || '어닝';
    document.getElementById('client-name').value = header.customer_name;
    document.getElementById('work-name').value   = header.site_name || '';
    document.getElementById('vat-toggle').checked = header.vat_on || false;
    document.getElementById('item-container').innerHTML = '';
    lines.forEach(l => {
      if (l.line_type === 'item') {
        const card = createCard();
        document.getElementById('item-container').appendChild(card);
        card.querySelector('.item-name').value = l.item_name;
        card.querySelector('.unit').value      = l.unit || '';
        if (card.querySelector('.unit2')) card.querySelector('.unit2').value = l.unit2 || '';
        card.querySelector('.qty').value       = l.quantity;
        card.querySelector('.price').value     = l.unit_price;
      } else if (l.line_type === 'labor') {
        const card = createLaborCard();
        document.getElementById('item-container').appendChild(card);
        card.querySelector('.labor-type').value   = l.item_name;
        card.querySelector('.labor-people').value = l.labor_people || '';
        card.querySelector('.labor-days').value   = l.labor_days   || '';
        card.querySelector('.labor-wage').value   = l.labor_wage   || '';
        const p = num(l.labor_people), d = num(l.labor_days), w = num(l.labor_wage);
        const amt = p * d * w;
        card.querySelector('.labor-subtotal').innerText = amt > 0
          ? `${l.labor_people}인 × ${l.labor_days}일 × ${fmt(w)}원 = ${fmt(amt)}원` : '';
      }
    });
    currentNo = header.estimate_id;
    document.getElementById('estimate-no').innerText = currentNo;
    updateLabels(); calculate();
    const locked = header.estimate_status === 'approved';
    switchTab('form');
    applyLock(locked);
    showToast(locked ? '🔒 확정된 견적입니다 — 수정 불가' : '✅ 불러왔어요 — ' + estimateId);
  }

  // ── 기록에서 바로 확정 ──
  function confirmRecord(estimateId) {
    const data = TNS_Storage.load(estimateId);
    if (!data) return;
    data.header.estimate_status = 'approved';
    TNS_Storage.save(data.header, data.lines);
    renderRecords();
    showToast('✅ 견적 확정 완료!');
  }

  // ── 삭제 ──
  function deleteRecord(estimateId) {
    if(!confirm('삭제할까요?')) return;
    TNS_Storage.delete(estimateId);
    renderRecords();
  }

  function pdfFromList(estimateId) {
    const data = TNS_Storage.load(estimateId);
    if (!data) { showToast('데이터를 불러올 수 없습니다.'); return; }
    const { header, lines } = data;
    const client = header.customer_name || '미정';
    const work   = header.project_name || '';
    const vatOn  = header.vat_on || false;
    const isApproved = header.estimate_status === 'approved';
    let supply = 0;
    const items = lines.filter(l => l.line_type === 'item').map(l => {
      const qty = num(l.quantity), price = num(l.unit_price), amt = qty * price;
      supply += amt;
      return { name: l.item_name, spec: l.unit||'', unit: l.unit2||'', qty, price, amt };
    });
    const labors = lines.filter(l => l.line_type === 'labor').map(l => {
      const p = num(l.labor_people), d = num(l.labor_days), w = num(l.labor_wage);
      const amt = p * d * w; supply += amt;
      return { type: l.item_name, people: p, days: d, wage: w, amt };
    });
    const vatAmt = vatOn ? Math.floor(supply * 0.1) : 0;
    const total  = vatOn ? supply + vatAmt : supply;
    const today  = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});
    const btn = event.target.closest ? (event.target.closest('button') || event.target) : event.target;
    makePDF(buildEstimateHTML(isApproved, { estimateId, client, work, vatOn, items, labors, supply, vatAmt, total, today }), `${estimateId}_${client}_견적서.pdf`, btn);
  }


  // ── 문서 공통 데이터 ──
  function getDocData() {
    const client = document.getElementById('client-name').value || '미정';
    const work   = document.getElementById('work-name').value || '';
    const vatOn  = document.getElementById('vat-toggle').checked;

    let supply = 0;
    const items = Array.from(document.querySelectorAll('.item-card')).map(c => {
      const name = c.querySelector('.item-name').value || '-';
      const spec = c.querySelector('.unit').value || '';
      const unit = c.querySelector('.unit2') ? (c.querySelector('.unit2').value || '') : '';
      const qty  = num(c.querySelector('.qty').value);
      const price= num(c.querySelector('.price').value);
      const amt  = qty * price;
      supply += amt;
      return { name, spec, unit, qty, price, amt, isLabor: false };
    });

    const labors = Array.from(document.querySelectorAll('.labor-card')).map(c => {
      const type   = c.querySelector('.labor-type').value;
      const people = num(c.querySelector('.labor-people').value);
      const days   = num(c.querySelector('.labor-days').value);
      const wage   = num(c.querySelector('.labor-wage').value);
      const amt    = people * days * wage;
      supply += amt;
      return { type, people, days, wage, amt, isLabor: true };
    });

    const vatAmt = vatOn ? Math.floor(supply * 0.1) : 0;
    const total  = vatOn ? supply + vatAmt : supply;
    const today  = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});

    return { client, work, vatOn, items, labors, supply, vatAmt, total, today };
  }

    return itemRows + laborRows;
  }

  function makePDF(htmlContent, filename, btn) {
    const origText = btn ? btn.innerText : '';
    if (btn) { btn.innerText = '⏳ 생성 중...'; btn.disabled = true; }

    // pdf-root에 콘텐츠 렌더링
    const pdfRoot = document.getElementById('pdf-root');
    pdfRoot.innerHTML = htmlContent;

    // 브라우저 인쇄 시 파일명 = document.title
    const origTitle = document.title;
    document.title = filename;

    // 폰트 로드 대기 후 인쇄
    setTimeout(() => {
      window.print();
      // 인쇄창 닫힌 후 복구
      setTimeout(() => {
        pdfRoot.innerHTML = '';
        document.title = origTitle;
        if (btn) { btn.innerText = origText; btn.disabled = false; }
      }, 1000);
    }, 500);
  }

  // ── PDF 생성 ──
  function generatePDF() {
    const btn = event.currentTarget;
    const { client } = getDocData();
    const statementOn = document.getElementById('statement-toggle').checked;
    if (statementOn) {
      const extD = Object.assign(getDocData(), {estimateId: currentNo});
      const combined = buildEstimateHTML(isLocked, extD) + '<div class="pdf-page-break"></div>' + buildStatementHTML(isLocked, extD);
      makePDF(combined, `${currentNo}_${client}_견적서+명세서.pdf`, btn);
    } else {
      makePDF(buildEstimateHTML(isLocked, Object.assign(getDocData(), {estimateId: currentNo})), `${currentNo}_${client}_견적서.pdf`, btn);
    }
  }



  // ── 모달 ──
  function showToast(m) {
    document.getElementById('modal-msg').innerText = m;
    document.getElementById('modal-overlay').classList.add('show');
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
  }

  document.addEventListener('focusin', (e) => {
    if (e.target.matches('input, select, textarea')) document.body.classList.add('keyboard-open');
  });
  document.addEventListener('focusout', () => {
    setTimeout(() => {
      if (!document.activeElement || !document.activeElement.matches('input, select, textarea')) {
        document.body.classList.remove('keyboard-open');
      }
    }, 80);
  });

  addItem();
